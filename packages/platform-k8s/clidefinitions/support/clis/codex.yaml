---
cliId: codex
displayName: Codex CLI
iconUrl: https://openai.com/favicon.ico
websiteUrl: https://openai.com/codex/
githubUrl: https://github.com/openai/codex
vendorId: openai
runtimeCapabilities:
- kind: RUNTIME_CAPABILITY_KIND_SKILL
  supported: false
- kind: RUNTIME_CAPABILITY_KIND_RULE
  supported: false
- kind: RUNTIME_CAPABILITY_KIND_MCP
  supported: false
- kind: RUNTIME_CAPABILITY_KIND_LSP
  supported: false
apiKeyProtocols:
- protocol: PROTOCOL_OPENAI_RESPONSES
  displayName: OpenAI Responses
  authMaterialization:
    materializationKey: codex.openai-responses-api-key
    runtimeUrlProjectionKind: RUNTIME_PROJECTION_KIND_BASE_URL
    includeRuntimeUrlHost: true
    requestAuthInjection:
      headerNames:
      - authorization
      headerValuePrefix: 'Bearer '
- protocol: PROTOCOL_OPENAI_COMPATIBLE
  displayName: OpenAI Compatible
  authMaterialization:
    materializationKey: codex.openai-compatible-api-key
    runtimeUrlProjectionKind: RUNTIME_PROJECTION_KIND_BASE_URL
    includeRuntimeUrlHost: true
    requestAuthInjection:
      headerNames:
      - authorization
      headerValuePrefix: 'Bearer '
oauth:
  displayName: OpenAI OAuth
  flow: O_AUTH_AUTHORIZATION_FLOW_CODE
  supportsOneClickAuthorization: true
  supportedPurposes:
  - CREDENTIAL_PURPOSE_DATA_PLANE
  - CREDENTIAL_PURPOSE_MANAGEMENT_PLANE
  recommended: true
  providerCard:
    enabled: true
  authMaterialization:
    materializationKey: codex.openai-oauth
    runtimeUrlProjectionKind: RUNTIME_PROJECTION_KIND_BASE_URL
    includeRuntimeUrlHost: true
    requestAuthInjection:
      headerNames:
      - authorization
      headerValuePrefix: 'Bearer '
  clientIdentity:
    observabilityUserAgentTemplate: codex_cli_rs/${client_version}
  observability:
    profiles:
    - profileId: oauth_management_state
      displayName: Codex OAuth Management State
      metrics:
      - name: gen_ai.provider.cli.oauth.session.starts.total
        description: Count of started CLI OAuth authorization sessions.
        unit: "{session}"
        kind: OBSERVABILITY_METRIC_KIND_COUNTER
        category: OBSERVABILITY_METRIC_CATEGORY_USAGE
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: flow
          description: OAuth authorization flow.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.session.terminal.total
        description: Count of terminal CLI OAuth authorization sessions.
        unit: "{session}"
        kind: OBSERVABILITY_METRIC_KIND_COUNTER
        category: OBSERVABILITY_METRIC_CATEGORY_USAGE
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: flow
          description: OAuth authorization flow.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: terminal_phase
          description: Terminal session phase.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.session.inflight
        description: Current number of non-terminal CLI OAuth authorization sessions.
        unit: "{session}"
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_USAGE
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: flow
          description: OAuth authorization flow.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.session.duration.seconds
        description: Duration of terminal CLI OAuth authorization sessions.
        unit: s
        kind: OBSERVABILITY_METRIC_KIND_HISTOGRAM
        category: OBSERVABILITY_METRIC_CATEGORY_USAGE
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: flow
          description: OAuth authorization flow.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: terminal_phase
          description: Terminal session phase.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.credential.expiry.timestamp.seconds
        description: Runtime-target scoped OAuth access token expiry timestamp.
        unit: s
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.next.refresh.timestamp.seconds
        description: Runtime-target scoped OAuth next refresh timestamp.
        unit: s
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.last.refreshed.timestamp.seconds
        description: Runtime-target scoped OAuth last refreshed timestamp.
        unit: s
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_USAGE
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.credential.generation
        description: Runtime-target scoped OAuth credential generation.
        unit: "{generation}"
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_USAGE
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.refresh.ready
        description: Whether runtime-target OAuth refresh status is ready.
        unit: "{state}"
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_USAGE
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.refresh.attempts.total
        description: Count of CLI OAuth refresh attempts scoped to bound access targets.
        unit: "{attempt}"
        kind: OBSERVABILITY_METRIC_KIND_COUNTER
        category: OBSERVABILITY_METRIC_CATEGORY_USAGE
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: result
          description: Refresh result category.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      activeQuery:
        minimumPollInterval: 1800s
    - profileId: oauth_runtime_headers
      displayName: Codex OAuth Runtime Headers
      metrics:
      - name: gen_ai.provider.runtime.requests.total
        description: Matched CLI OAuth runtime requests observed by the sidecar.
        unit: "{request}"
        kind: OBSERVABILITY_METRIC_KIND_COUNTER
        category: OBSERVABILITY_METRIC_CATEGORY_USAGE
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: host
          description: Matched upstream host.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - name: model_id
          description: Requested model identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - name: status_class
          description: HTTP response status class.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.runtime.rate_limit.events.total
        description: CLI OAuth runtime rate limit events observed by the sidecar.
        unit: "{event}"
        kind: OBSERVABILITY_METRIC_KIND_COUNTER
        category: OBSERVABILITY_METRIC_CATEGORY_RATE_LIMIT
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: host
          description: Matched upstream host.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - name: model_id
          description: Requested model identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - name: limit_kind
          description: Rate-limit category derived by the sidecar.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.runtime.last_seen.timestamp.seconds
        description: Unix timestamp of the most recent matched CLI OAuth runtime response.
        unit: s
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_USAGE
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: host
          description: Matched upstream host.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - name: model_id
          description: Requested model identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
      - name: gen_ai.provider.runtime.retry_after.seconds
        description: Retry-after duration exported from matched CLI OAuth responses.
        unit: s
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_RATE_LIMIT
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: host
          description: Matched upstream host.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - name: model_id
          description: Requested model identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
      - name: gen_ai.provider.cli.oauth.codex.limit.reached
        description: Whether Codex account usage is currently blocked.
        unit: "{state}"
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_RATE_LIMIT
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.codex.primary.window.used.percent
        description: Codex primary quota window used percentage.
        unit: "%"
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.codex.primary.window.reset.timestamp.seconds
        description: Codex primary quota window reset timestamp.
        unit: s
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.codex.primary.window.duration.minutes
        description: Codex primary quota window duration in minutes.
        unit: min
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.codex.secondary.window.used.percent
        description: Codex secondary quota window used percentage.
        unit: "%"
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.codex.secondary.window.reset.timestamp.seconds
        description: Codex secondary quota window reset timestamp.
        unit: s
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.codex.secondary.window.duration.minutes
        description: Codex secondary quota window duration in minutes.
        unit: min
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.codex.plan.type.code
        description: Codex account plan type exported as a Codex-specific numeric
          code.
        unit: "{code}"
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      responseHeaders:
        headerMetricMappings:
        - headerName: retry-after
          metricName: gen_ai.provider.runtime.retry_after.seconds
          valueType: HEADER_VALUE_TYPE_DURATION_SECONDS
      metricQueries:
      - queryId: codex_primary_window_used_percent
        displayName: Codex Primary Window Used Percent
        language: METRIC_QUERY_LANGUAGE_PROMQL
        statement: max by (cli_id, access_target_id) (gen_ai_provider_cli_oauth_codex_primary_window_used_percent)
        metricNames:
        - gen_ai.provider.cli.oauth.codex.primary.window.used.percent
        resultKind: METRIC_QUERY_RESULT_KIND_VECTOR
      - queryId: codex_secondary_window_used_percent
        displayName: Codex Secondary Window Used Percent
        language: METRIC_QUERY_LANGUAGE_PROMQL
        statement: max by (cli_id, access_target_id) (gen_ai_provider_cli_oauth_codex_secondary_window_used_percent)
        metricNames:
        - gen_ai.provider.cli.oauth.codex.secondary.window.used.percent
        resultKind: METRIC_QUERY_RESULT_KIND_VECTOR
  modelCatalog:
    authenticatedDiscovery:
      collectorId: codex-oauth
      authorityPriority: 650
      operation:
        baseUrl: https://chatgpt.com/backend-api/codex
        path: models
        queryParameters:
        - name: client_version
          dynamicValue: DISCOVERY_DYNAMIC_VALUE_CLIENT_VERSION
        responseKind: MODEL_CATALOG_DISCOVERY_RESPONSE_KIND_CODEX_MODELS
    defaultCatalog:
      source: CATALOG_SOURCE_FALLBACK_CONFIG
      models:
      - providerModelId: gpt-5.4
        modelRef:
          vendorId: openai
          modelId: gpt-5.4
        providerMetadata:
          accessKind: PROVIDER_MODEL_ACCESS_KIND_DIRECT
      - providerModelId: gpt-5.3-codex
        modelRef:
          vendorId: openai
          modelId: gpt-5.3-codex
        providerMetadata:
          accessKind: PROVIDER_MODEL_ACCESS_KIND_DIRECT
      - providerModelId: gpt-5.2-codex
        modelRef:
          vendorId: openai
          modelId: gpt-5.2-codex
        providerMetadata:
          accessKind: PROVIDER_MODEL_ACCESS_KIND_DIRECT
      - providerModelId: gpt-5.1-codex-max
        modelRef:
          vendorId: openai
          modelId: gpt-5.1-codex-max
        providerMetadata:
          accessKind: PROVIDER_MODEL_ACCESS_KIND_DIRECT
      - providerModelId: gpt-5.1-codex-mini
        modelRef:
          vendorId: openai
          modelId: gpt-5.1-codex-mini
        providerMetadata:
          accessKind: PROVIDER_MODEL_ACCESS_KIND_DIRECT
  oauthClient:
    clientId: app_EMoamEEZ73f0CkXaXp7hrann
    scopes:
    - openid
    - email
    - profile
    - offline_access
    pkce:
      required: true
      challengeMethod: O_AUTH_CODE_CHALLENGE_METHOD_S256
  artifactProjection:
    fieldMappings:
    - target: O_AUTH_ARTIFACT_TARGET_FIELD_ACCOUNT_ID
      source: O_AUTH_ARTIFACT_SOURCE_ID_TOKEN_CLAIMS
      jsonPointer: "/https:~1~1api.openai.com~1auth/chatgpt_account_id"
      fallbackToSubject: true
    - target: O_AUTH_ARTIFACT_TARGET_FIELD_ACCOUNT_EMAIL
      source: O_AUTH_ARTIFACT_SOURCE_ID_TOKEN_CLAIMS
      jsonPointer: "/email"
  accountSummaryFields:
  - fieldId: account-email
    label: Account
    source: CREDENTIAL_SUBJECT_SUMMARY_SOURCE_ARTIFACT_SUBJECT_EMAIL
    valueFormat: CREDENTIAL_SUBJECT_SUMMARY_VALUE_FORMAT_MASK_EMAIL
  codeFlow:
    authorizationUrl: https://auth.openai.com/oauth/authorize
    tokenUrl: https://auth.openai.com/oauth/token
    authorizationParameters:
    - name: prompt
      value: login
    - name: id_token_add_organizations
      value: 'true'
    - name: codex_cli_simplified_flow
      value: 'true'
    callbackDelivery:
      mode: O_AUTH_CALLBACK_MODE_LOCALHOST_RELAY
      callbackProviderId: codex
      providerRedirectUri: http://localhost:1455/auth/callback
      localhostListenHost: 127.0.0.1
      localhostListenPort: 1455
      localhostCallbackPath: "/auth/callback"
    requiresState: true
  providerBinding:
    surfaceId: openai-compatible
officialVersionSource:
  npmDistTag:
    packageName: "@openai/codex"
    distTag: latest
