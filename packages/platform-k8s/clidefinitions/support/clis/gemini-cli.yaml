---
cliId: gemini-cli
displayName: Gemini CLI
iconUrl: https://www.gstatic.com/lamda/images/gemini_sparkle_aurora_33f86dc0c0257da337c63.svg
websiteUrl: https://gemini.google.com
githubUrl: https://github.com/google-gemini/gemini-cli
vendorId: google
runtimeCapabilities:
- kind: RUNTIME_CAPABILITY_KIND_SKILL
  supported: false
- kind: RUNTIME_CAPABILITY_KIND_RULE
  supported: false
- kind: RUNTIME_CAPABILITY_KIND_MCP
  supported: false
- kind: RUNTIME_CAPABILITY_KIND_LSP
  supported: false
oauth:
  displayName: Google OAuth
  flow: O_AUTH_AUTHORIZATION_FLOW_CODE
  supportsOneClickAuthorization: true
  supportedPurposes:
  - CREDENTIAL_PURPOSE_DATA_PLANE
  recommended: true
  authMaterialization:
    materializationKey: gemini-cli.google-oauth
    runtimeUrlProjectionKind: RUNTIME_PROJECTION_KIND_BASE_URL
    includeRuntimeUrlHost: true
    extraTargetHosts:
    - oauth2.googleapis.com
    - www.googleapis.com
    requestAuthInjection:
      headerNames:
      - authorization
      headerValuePrefix: 'Bearer '
  observability:
    profiles:
    - profileId: oauth_management_state
      displayName: Gemini OAuth Management State
      metrics:
      - name: gen_ai.provider.cli.oauth.session.starts.total
        description: Count of started CLI OAuth authorization sessions.
        unit: "{session}"
        kind: OBSERVABILITY_METRIC_KIND_COUNTER
        category: OBSERVABILITY_METRIC_CATEGORY_USAGE
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: flow
          description: OAuth authorization flow.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.session.terminal.total
        description: Count of terminal CLI OAuth authorization sessions.
        unit: "{session}"
        kind: OBSERVABILITY_METRIC_KIND_COUNTER
        category: OBSERVABILITY_METRIC_CATEGORY_USAGE
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: flow
          description: OAuth authorization flow.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: terminal_phase
          description: Terminal session phase.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.session.inflight
        description: Current number of non-terminal CLI OAuth authorization sessions.
        unit: "{session}"
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_USAGE
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: flow
          description: OAuth authorization flow.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.session.duration.seconds
        description: Duration of terminal CLI OAuth authorization sessions.
        unit: s
        kind: OBSERVABILITY_METRIC_KIND_HISTOGRAM
        category: OBSERVABILITY_METRIC_CATEGORY_USAGE
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: flow
          description: OAuth authorization flow.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: terminal_phase
          description: Terminal session phase.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.credential.expiry.timestamp.seconds
        description: Runtime-target scoped OAuth access token expiry timestamp.
        unit: s
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.next.refresh.timestamp.seconds
        description: Runtime-target scoped OAuth next refresh timestamp.
        unit: s
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.last.refreshed.timestamp.seconds
        description: Runtime-target scoped OAuth last refreshed timestamp.
        unit: s
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_USAGE
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.credential.generation
        description: Runtime-target scoped OAuth credential generation.
        unit: "{generation}"
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_USAGE
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.refresh.ready
        description: Whether runtime-target OAuth refresh status is ready.
        unit: "{state}"
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_USAGE
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.refresh.attempts.total
        description: Count of CLI OAuth refresh attempts scoped to bound access targets.
        unit: "{attempt}"
        kind: OBSERVABILITY_METRIC_KIND_COUNTER
        category: OBSERVABILITY_METRIC_CATEGORY_USAGE
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: result
          description: Refresh result category.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.gemini.pro.remaining.amount
        description: Remaining Gemini Pro quota amount for the active project.
        unit: "{remaining}"
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.gemini.pro.remaining.fraction.percent
        description: Remaining Gemini Pro quota percentage for the active project.
        unit: "%"
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.gemini.pro.reset.timestamp.seconds
        description: Reset timestamp of the Gemini Pro quota window.
        unit: s
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.gemini.flash.remaining.amount
        description: Remaining Gemini Flash quota amount for the active project.
        unit: "{remaining}"
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.gemini.flash.remaining.fraction.percent
        description: Remaining Gemini Flash quota percentage for the active project.
        unit: "%"
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.gemini.flash.reset.timestamp.seconds
        description: Reset timestamp of the Gemini Flash quota window.
        unit: s
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.gemini.flash.lite.remaining.amount
        description: Remaining Gemini Flash Lite quota amount for the active project.
        unit: "{remaining}"
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.gemini.flash.lite.remaining.fraction.percent
        description: Remaining Gemini Flash Lite quota percentage for the active project.
        unit: "%"
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.cli.oauth.gemini.flash.lite.reset.timestamp.seconds
        description: Reset timestamp of the Gemini Flash Lite quota window.
        unit: s
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      activeQuery:
        minimumPollInterval: 1800s
      metricQueries:
      - queryId: gemini_pro_remaining_fraction_percent
        displayName: Gemini Pro Remaining Percent
        language: METRIC_QUERY_LANGUAGE_PROMQL
        statement: max by (cli_id, access_target_id) (gen_ai_provider_cli_oauth_gemini_pro_remaining_fraction_percent)
        metricNames:
        - gen_ai.provider.cli.oauth.gemini.pro.remaining.fraction.percent
        resultKind: METRIC_QUERY_RESULT_KIND_VECTOR
      - queryId: gemini_flash_remaining_fraction_percent
        displayName: Gemini Flash Remaining Percent
        language: METRIC_QUERY_LANGUAGE_PROMQL
        statement: max by (cli_id, access_target_id) (gen_ai_provider_cli_oauth_gemini_flash_remaining_fraction_percent)
        metricNames:
        - gen_ai.provider.cli.oauth.gemini.flash.remaining.fraction.percent
        resultKind: METRIC_QUERY_RESULT_KIND_VECTOR
      - queryId: gemini_flash_lite_remaining_fraction_percent
        displayName: Gemini Flash Lite Remaining Percent
        language: METRIC_QUERY_LANGUAGE_PROMQL
        statement: max by (cli_id, access_target_id) (gen_ai_provider_cli_oauth_gemini_flash_lite_remaining_fraction_percent)
        metricNames:
        - gen_ai.provider.cli.oauth.gemini.flash.lite.remaining.fraction.percent
        resultKind: METRIC_QUERY_RESULT_KIND_VECTOR
    - profileId: oauth_runtime_headers
      displayName: Gemini OAuth Runtime Headers
      metrics:
      - name: gen_ai.provider.runtime.requests.total
        description: Matched CLI OAuth runtime requests observed by the sidecar.
        unit: "{request}"
        kind: OBSERVABILITY_METRIC_KIND_COUNTER
        category: OBSERVABILITY_METRIC_CATEGORY_USAGE
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: host
          description: Matched upstream host.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - name: model_id
          description: Requested model identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - name: status_class
          description: HTTP response status class.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.runtime.rate_limit.events.total
        description: CLI OAuth runtime rate limit events observed by the sidecar.
        unit: "{event}"
        kind: OBSERVABILITY_METRIC_KIND_COUNTER
        category: OBSERVABILITY_METRIC_CATEGORY_RATE_LIMIT
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: host
          description: Matched upstream host.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - name: model_id
          description: Requested model identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - name: limit_kind
          description: Rate-limit category derived by the sidecar.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
      - name: gen_ai.provider.runtime.last_seen.timestamp.seconds
        description: Unix timestamp of the most recent matched CLI OAuth runtime response.
        unit: s
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_USAGE
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: host
          description: Matched upstream host.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - name: model_id
          description: Requested model identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
      - name: gen_ai.provider.runtime.retry_after.seconds
        description: Retry-after duration exported from matched CLI OAuth responses.
        unit: s
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        category: OBSERVABILITY_METRIC_CATEGORY_RATE_LIMIT
        attributes:
        - name: cli_id
          description: Stable CLI identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: access_target_id
          description: Stable access target identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - name: host
          description: Matched upstream host.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - name: model_id
          description: Requested model identifier.
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
      responseHeaders:
        headerMetricMappings:
        - headerName: retry-after
          metricName: gen_ai.provider.runtime.retry_after.seconds
          valueType: HEADER_VALUE_TYPE_DURATION_SECONDS
  modelCatalog:
    authenticatedDiscovery:
      collectorId: gemini-oauth
      authorityPriority: 650
      operation:
        baseUrl: https://cloudcode-pa.googleapis.com
        path: v1internal:retrieveUserQuota
        method: DISCOVERY_HTTP_METHOD_POST
        jsonBodyFields:
        - name: project
          dynamicValue: DISCOVERY_DYNAMIC_VALUE_PROJECT_ID
        responseKind: MODEL_CATALOG_DISCOVERY_RESPONSE_KIND_GEMINI_QUOTA_BUCKETS
    defaultCatalog:
      source: CATALOG_SOURCE_FALLBACK_CONFIG
      models:
      - providerModelId: gemini-2.5-pro
        modelRef:
          vendorId: google
          modelId: gemini-2.5-pro
        providerMetadata:
          accessKind: PROVIDER_MODEL_ACCESS_KIND_DIRECT
      - providerModelId: gemini-2.5-flash
        modelRef:
          vendorId: google
          modelId: gemini-2.5-flash
        providerMetadata:
          accessKind: PROVIDER_MODEL_ACCESS_KIND_DIRECT
      - providerModelId: gemini-2.5-flash-lite
        modelRef:
          vendorId: google
          modelId: gemini-2.5-flash-lite
        providerMetadata:
          accessKind: PROVIDER_MODEL_ACCESS_KIND_DIRECT
      - providerModelId: gemini-3-pro-preview
        modelRef:
          vendorId: google
          modelId: gemini-3-pro-preview
        providerMetadata:
          accessKind: PROVIDER_MODEL_ACCESS_KIND_DIRECT
      - providerModelId: gemini-3.1-pro-preview
        modelRef:
          vendorId: google
          modelId: gemini-3.1-pro-preview
        providerMetadata:
          accessKind: PROVIDER_MODEL_ACCESS_KIND_DIRECT
      - providerModelId: gemini-3-flash-preview
        modelRef:
          vendorId: google
          modelId: gemini-3-flash-preview
        providerMetadata:
          accessKind: PROVIDER_MODEL_ACCESS_KIND_DIRECT
      - providerModelId: gemini-3.1-flash-lite-preview
        modelRef:
          vendorId: google
          modelId: gemini-3.1-flash-lite-preview
        providerMetadata:
          accessKind: PROVIDER_MODEL_ACCESS_KIND_DIRECT
  oauthClient:
    clientId: 681255809395-oo8ft2oprdrnp9e3aqf6av3hmdib135j.apps.googleusercontent.com
    scopes:
    - https://www.googleapis.com/auth/cloud-platform
    - https://www.googleapis.com/auth/userinfo.email
    - https://www.googleapis.com/auth/userinfo.profile
    pkce:
      required: true
      challengeMethod: O_AUTH_CODE_CHALLENGE_METHOD_S256
  accountSummaryFields:
  - fieldId: account-email
    label: Account
    source: CREDENTIAL_SUBJECT_SUMMARY_SOURCE_ARTIFACT_SUBJECT_EMAIL
    valueFormat: CREDENTIAL_SUBJECT_SUMMARY_VALUE_FORMAT_MASK_EMAIL
  - fieldId: tier
    label: Tier
    source: CREDENTIAL_SUBJECT_SUMMARY_SOURCE_CREDENTIAL_SECRET
    secretKey: tier_name
    valueFormat: CREDENTIAL_SUBJECT_SUMMARY_VALUE_FORMAT_PLAIN_TEXT
  - fieldId: project
    label: Project
    source: CREDENTIAL_SUBJECT_SUMMARY_SOURCE_CREDENTIAL_SECRET
    secretKey: project_id
    valueFormat: CREDENTIAL_SUBJECT_SUMMARY_VALUE_FORMAT_PLAIN_TEXT
  providerCard:
    enabled: true
  codeFlow:
    authorizationUrl: https://accounts.google.com/o/oauth2/v2/auth
    tokenUrl: https://oauth2.googleapis.com/token
    authorizationParameters:
    - name: access_type
      value: offline
    - name: prompt
      value: consent
    callbackDelivery:
      mode: O_AUTH_CALLBACK_MODE_LOCALHOST_RELAY
      callbackProviderId: gemini-cli
      providerRedirectUri: http://localhost:1455/auth/callback
      localhostListenHost: 127.0.0.1
      localhostListenPort: 1455
      localhostCallbackPath: "/auth/callback"
    requiresState: true
  providerBinding:
    surfaceId: gemini
officialVersionSource:
  npmDistTag:
    packageName: "@google/gemini-cli"
    distTag: latest
