        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        name: gen_ai.provider.quota.reset.timestamp.seconds
        unit: s
      profileId: api_key_quota
  providerBinding:
    surfaceId: openai-compatible
  providerCard:
    enabled: true
  surfaceTemplates:
  - bootstrapCatalog:
      models:
      - modelRef:
          modelId: MiniMax-M2.7
          vendorId: minimax
        providerModelId: MiniMax-M2.7
