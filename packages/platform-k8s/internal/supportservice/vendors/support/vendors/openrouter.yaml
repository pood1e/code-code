---
providerBindings:
- observability:
    profiles:
    - displayName: OpenRouter Rate Limits
      metrics:
      - attributes:
        - description: Stable vendor identifier.
          name: vendor_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Stable access target identifier.
          name: access_target_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Stable provider identifier.
          name: provider_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Rate limited resource type (requests, tokens).
          name: resource
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        category: OBSERVABILITY_METRIC_CATEGORY_RATE_LIMIT
        description: OpenRouter rate limit ceiling for one resource type.
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        name: gen_ai.provider.runtime.rate_limit.limit
        unit: "1"
      - attributes:
        - description: Stable vendor identifier.
          name: vendor_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Stable access target identifier.
          name: access_target_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Stable provider identifier.
          name: provider_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Rate limited resource type (requests, tokens).
          name: resource
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        category: OBSERVABILITY_METRIC_CATEGORY_RATE_LIMIT
        description: OpenRouter remaining rate limit for one resource type.
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        name: gen_ai.provider.runtime.rate_limit.remaining
        unit: "1"
      passiveHttp:
        capturePoint: TELEMETRY_CAPTURE_POINT_EGRESS
        emitAccessLog: true
        redaction:
          dropRawHeaders: true
          redactHeaders:
          - authorization
          - cookie
          - set-cookie
        transforms:
        - headerName: x-ratelimit-limit-requests
          labels:
          - name: resource
            value: requests
          metricName: gen_ai.provider.runtime.rate_limit.limit
          source: HTTP_HEADER_SOURCE_RESPONSE
          valueType: HEADER_VALUE_TYPE_INT64
        - headerName: x-ratelimit-remaining-requests
          labels:
          - name: resource
            value: requests
          metricName: gen_ai.provider.runtime.rate_limit.remaining
          source: HTTP_HEADER_SOURCE_RESPONSE
          valueType: HEADER_VALUE_TYPE_INT64
        - headerName: x-ratelimit-limit-tokens
          labels:
          - name: resource
            value: tokens
          metricName: gen_ai.provider.runtime.rate_limit.limit
          source: HTTP_HEADER_SOURCE_RESPONSE
          valueType: HEADER_VALUE_TYPE_INT64
        - headerName: x-ratelimit-remaining-tokens
          labels:
          - name: resource
            value: tokens
          metricName: gen_ai.provider.runtime.rate_limit.remaining
          source: HTTP_HEADER_SOURCE_RESPONSE
          valueType: HEADER_VALUE_TYPE_INT64
      profileId: openrouter_ratelimits
    - activeQuery:
        collectorId: openrouter-quotas
        minimumPollInterval: 300s
      displayName: OpenRouter Usage
      metrics:
      - attributes:
        - description: Stable vendor identifier.
          name: vendor_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Stable access target identifier.
          name: access_target_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Stable provider identifier.
          name: provider_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Provider model identifier.
          name: model_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Usage resource type.
          name: resource
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Usage time window.
          name: window
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        category: OBSERVABILITY_METRIC_CATEGORY_USAGE
        description: OpenRouter request usage by model over the provider activity
          window.
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        name: gen_ai.provider.usage.requests.count
        unit: '{request}'
      - attributes:
        - description: Stable vendor identifier.
          name: vendor_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Stable access target identifier.
          name: access_target_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Stable provider identifier.
          name: provider_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Provider model identifier.
          name: model_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Usage resource type.
          name: resource
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Usage time window.
          name: window
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        category: OBSERVABILITY_METRIC_CATEGORY_USAGE
        description: OpenRouter spend by model over the provider activity window.
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        name: gen_ai.provider.usage.cost.usd
        unit: USD
      - attributes:
        - description: Stable vendor identifier.
          name: vendor_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Stable access target identifier.
          name: access_target_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Stable provider identifier.
          name: provider_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED
        - description: Provider model identifier.
          name: model_id
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Usage resource type.
          name: resource
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Usage time window.
          name: window
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Token direction (input or output).
          name: token_type
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        category: OBSERVABILITY_METRIC_CATEGORY_USAGE
        description: OpenRouter token usage by model and token type over the provider
          activity window.
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        name: gen_ai.provider.usage.tokens.count
        unit: '{token}'
      profileId: openrouter_usage
  providerBinding:
    surfaceId: openai-compatible
  providerCard:
    enabled: true
  surfaceTemplates:
  - runtime:
      api:
        baseUrl: https://openrouter.ai/api/v1
        protocol: PROTOCOL_OPENAI_COMPATIBLE
      displayName: OpenRouter OpenAI Compatible
    surfaceId: openai-compatible
