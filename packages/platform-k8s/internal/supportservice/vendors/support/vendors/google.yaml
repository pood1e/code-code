        - description: Rate limited resource type (requests, tokens, etc).
          name: resource
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Rate limit time window (minute, hour, day).
          name: window
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        - description: Quota dimension key (RPM, TPM, etc).
          name: quota_type
          requirementLevel: OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED
        category: OBSERVABILITY_METRIC_CATEGORY_QUOTA
        description: Google AI Studio quota reset timestamp per model and quota window.
        kind: OBSERVABILITY_METRIC_KIND_GAUGE
        name: gen_ai.provider.quota.reset.timestamp.seconds
        unit: "1"
      profileId: aistudio_quota
