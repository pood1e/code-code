version: v2
plugins:
  - local: protoc-gen-go
    out: ../go-contract
    opt:
      - paths=source_relative
  - local: protoc-gen-go-grpc
    out: ../go-contract
    opt:
      - paths=source_relative
  - local: protoc-gen-connect-go
    out: ../go-contract
    opt:
      - paths=source_relative
      - simple
  - local: ./tools/protoc-gen-es-wrapper
    out: ../agent-contract/src/gen
    opt:
      - target=ts
