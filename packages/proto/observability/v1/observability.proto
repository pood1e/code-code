syntax = "proto3";

package observability.v1;

import "google/protobuf/duration.proto";

option go_package = "code-code.internal/go-contract/observability/v1;observabilityv1";

// ObservabilityCapability describes a reusable observability capability block
// hosted by one support surface.
message ObservabilityCapability {
  repeated ObservabilityProfile profiles = 1;
}

// ObservabilityProfile describes one coherent metric collection contract.
message ObservabilityProfile {
  string profile_id = 1;
  string display_name = 2;

  // Optional binding to host-package sub-surfaces. Semantics are defined by
  // the host package. Empty means host-wide.
  repeated string scope_ids = 3;

  repeated ObservabilityMetric metrics = 4;

  oneof collection {
    ActiveQueryCollection active_query = 5;
    PassiveHttpTelemetryCollection passive_http = 6;
  }

  // Stable metric queries consumed by availability judgment.
  repeated MetricQuery metric_queries = 7;

  // Subject-level availability judgment rules derived from declared queries.
  AvailabilityJudgment availability_judgment = 8;
}

// ObservabilityMetric describes one OTel-style metric contract.
message ObservabilityMetric {
  string name = 1;
  string description = 2;
  string unit = 3;
  ObservabilityMetricKind kind = 4;
  ObservabilityMetricCategory category = 5;
  repeated ObservabilityMetricAttribute attributes = 6;
}

// ObservabilityMetricKind identifies the instrument kind of one metric.
enum ObservabilityMetricKind {
  OBSERVABILITY_METRIC_KIND_UNSPECIFIED = 0;
  OBSERVABILITY_METRIC_KIND_GAUGE = 1;
  OBSERVABILITY_METRIC_KIND_COUNTER = 2;
  OBSERVABILITY_METRIC_KIND_HISTOGRAM = 3;
}

// ObservabilityMetricCategory identifies the business category of one metric.
enum ObservabilityMetricCategory {
  OBSERVABILITY_METRIC_CATEGORY_UNSPECIFIED = 0;
  OBSERVABILITY_METRIC_CATEGORY_QUOTA = 1;
  OBSERVABILITY_METRIC_CATEGORY_USAGE = 2;
  OBSERVABILITY_METRIC_CATEGORY_RATE_LIMIT = 3;
}

// ObservabilityMetricAttribute describes one metric attribute contract.
message ObservabilityMetricAttribute {
  string name = 1;
  string description = 2;
  ObservabilityAttributeRequirementLevel requirement_level = 3;
}

// ObservabilityAttributeRequirementLevel identifies how strongly one attribute
// is expected to be present.
enum ObservabilityAttributeRequirementLevel {
  OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_UNSPECIFIED = 0;
  OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_REQUIRED = 1;
  OBSERVABILITY_ATTRIBUTE_REQUIREMENT_LEVEL_RECOMMENDED = 2;
}

// ActiveQueryCollection declares an active query collection policy.
message ActiveQueryCollection {
  google.protobuf.Duration minimum_poll_interval = 1;

  // Dynamic parameters required by the collector when surface auth is not
  // sufficient. Actual values are supplied by the host provider config.
  repeated DynamicParameterDefinition dynamic_parameters = 2;

  // Optional collector implementation key resolved by the host package.
  // Empty means host-default active query execution.
  string collector_id = 3;

  // Explicit credential values that the collector may persist after a
  // successful query. The collector must ignore all undeclared values.
  repeated CredentialBackfillRule credential_backfills = 4;

  // Optional schema-driven form used to collect management-plane credential
  // inputs required by this active query.
  ActiveQueryInputForm input_form = 5;

  // Explicit non-secret material keys the collector may read back on later
  // runs. Secret tokens/cookies should stay behind authservice/egress auth and
  // must not be listed here.
  repeated string material_read_fields = 6;
}

// DynamicParameterDefinition describes one dynamically supplied parameter.
message DynamicParameterDefinition {
  string parameter_id = 1;
  string display_name = 2;
  string description = 3;
  bool required = 4;
  bool secret = 5;
}

// ActiveQueryInputForm describes provider-owned credential inputs needed by one
// active query. UI clients render this schema instead of hard-coding per-vendor
// fields.
message ActiveQueryInputForm {
  string schema_id = 1;
  string title = 2;
  string action_label = 3;
  string description = 4;
  repeated ActiveQueryInputField fields = 5;
}

// ActiveQueryInputField describes one operator-supplied input field.
message ActiveQueryInputField {
  string field_id = 1;
  string label = 2;
  string description = 3;
  string placeholder = 4;
  bool required = 5;
  bool sensitive = 6;
  ActiveQueryInputControl control = 7;
  ActiveQueryInputPersistence persistence = 8;
  string target_field_id = 9;
  ActiveQueryInputValueTransform transform = 10;
  string default_value = 11;
}

// ActiveQueryInputControl identifies the preferred UI control for one input.
enum ActiveQueryInputControl {
  ACTIVE_QUERY_INPUT_CONTROL_UNSPECIFIED = 0;
  ACTIVE_QUERY_INPUT_CONTROL_TEXT = 1;
  ACTIVE_QUERY_INPUT_CONTROL_PASSWORD = 2;
  ACTIVE_QUERY_INPUT_CONTROL_TEXTAREA = 3;
}

// ActiveQueryInputPersistence describes whether a submitted field is persisted
// into provider observability credential material.
enum ActiveQueryInputPersistence {
  ACTIVE_QUERY_INPUT_PERSISTENCE_UNSPECIFIED = 0;
  ACTIVE_QUERY_INPUT_PERSISTENCE_STORED_MATERIAL = 1;
  ACTIVE_QUERY_INPUT_PERSISTENCE_TRANSIENT = 2;
}

// ActiveQueryInputValueTransform describes a built-in normalization applied to
// an input value before it is persisted.
enum ActiveQueryInputValueTransform {
  ACTIVE_QUERY_INPUT_VALUE_TRANSFORM_UNSPECIFIED = 0;
  ACTIVE_QUERY_INPUT_VALUE_TRANSFORM_IDENTITY = 1;
  ACTIVE_QUERY_INPUT_VALUE_TRANSFORM_MERGE_SET_COOKIE = 2;
}

// CredentialBackfillRule declares one credential value that may be persisted
// from an active query result.
message CredentialBackfillRule {
  string rule_id = 1;
  CredentialBackfillSource source = 2;
  string source_name = 3;
  string target_material_key = 4;
  bool required = 5;
  // If true, this persisted value may be read back by the same active query
  // collector on later runs. Leave false for token/cookie/session material that
  // should remain write-only outside authservice.
  bool readable = 6;
}

// CredentialBackfillSource identifies where a credential backfill value comes
// from. Collectors remain responsible for parsing provider-specific formats.
enum CredentialBackfillSource {
  CREDENTIAL_BACKFILL_SOURCE_UNSPECIFIED = 0;
  CREDENTIAL_BACKFILL_SOURCE_COLLECTOR_OUTPUT = 1;
  CREDENTIAL_BACKFILL_SOURCE_HTTP_RESPONSE_HEADER = 2;
  CREDENTIAL_BACKFILL_SOURCE_HTTP_RESPONSE_COOKIE = 3;
}

// PassiveHttpTelemetryCollection declares how an official HTTP telemetry stream
// is selected, sanitized, and converted into metrics.
message PassiveHttpTelemetryCollection {
  TelemetryCapturePoint capture_point = 1;
  repeated HttpTelemetrySelector selectors = 2;
  repeated HttpHeaderTelemetryTransform transforms = 3;
  HeaderRedactionPolicy redaction = 4;
  bool emit_access_log = 5;
}

// TelemetryCapturePoint identifies the L7 proxy point that owns capture.
enum TelemetryCapturePoint {
  TELEMETRY_CAPTURE_POINT_UNSPECIFIED = 0;
  TELEMETRY_CAPTURE_POINT_EGRESS = 1;
  TELEMETRY_CAPTURE_POINT_DESTINATION_WAYPOINT = 2;
}

// HttpTelemetrySelector narrows the HTTP stream handled by one profile.
message HttpTelemetrySelector {
  repeated string hostnames = 1;
  repeated string path_prefixes = 2;
  repeated string methods = 3;
  repeated uint32 status_codes = 4;
}

// HttpHeaderTelemetryTransform maps one selected HTTP header to one metric.
message HttpHeaderTelemetryTransform {
  HttpHeaderSource source = 1;
  string header_name = 2;
  string metric_name = 3;
  HeaderValueType value_type = 4;
  repeated TelemetryMetricLabel labels = 5;
}

// HttpHeaderSource identifies the HTTP header bag used by one transform.
enum HttpHeaderSource {
  HTTP_HEADER_SOURCE_UNSPECIFIED = 0;
  HTTP_HEADER_SOURCE_REQUEST = 1;
  HTTP_HEADER_SOURCE_RESPONSE = 2;
}

// TelemetryMetricLabel binds one fixed metric label value to one telemetry
// transform.
message TelemetryMetricLabel {
  string name = 1;
  string value = 2;
}

// HeaderRedactionPolicy describes how raw header values are protected before
// leaving the collector pipeline.
message HeaderRedactionPolicy {
  bool drop_raw_headers = 1;
  repeated string hash_headers = 2;
  repeated string redact_headers = 3;
}

// MetricQuery describes one stable metrics query statement.
message MetricQuery {
  string query_id = 1;
  string display_name = 2;
  MetricQueryLanguage language = 3;
  string statement = 4;
  repeated string metric_names = 5;
  MetricQueryResultKind result_kind = 6;
}

// MetricQueryLanguage identifies the query language used by one metric query.
enum MetricQueryLanguage {
  METRIC_QUERY_LANGUAGE_UNSPECIFIED = 0;
  METRIC_QUERY_LANGUAGE_PROMQL = 1;
}

// MetricQueryResultKind identifies the expected result shape of one query.
enum MetricQueryResultKind {
  METRIC_QUERY_RESULT_KIND_UNSPECIFIED = 0;
  METRIC_QUERY_RESULT_KIND_SCALAR = 1;
  METRIC_QUERY_RESULT_KIND_VECTOR = 2;
  METRIC_QUERY_RESULT_KIND_RANGE_VECTOR = 3;
}

// AvailabilityJudgment describes how one subject's availability is derived
// from declared metric queries.
message AvailabilityJudgment {
  AvailabilitySubjectKind subject_kind = 1;
  string subject_label_key = 2;
  repeated string query_ids = 3;
  repeated AvailabilityRule rules = 4;
}

// AvailabilitySubjectKind identifies the entity type judged by one profile.
enum AvailabilitySubjectKind {
  AVAILABILITY_SUBJECT_KIND_UNSPECIFIED = 0;
  AVAILABILITY_SUBJECT_KIND_MODEL = 1;
}

// AvailabilityRule maps one predicate set to one derived availability state.
message AvailabilityRule {
  string rule_id = 1;
  string display_name = 2;
  repeated AvailabilityPredicate all_of = 3;
  AvailabilityState state = 4;
}

// AvailabilityPredicate compares one query result against one threshold.
message AvailabilityPredicate {
  string query_id = 1;
  ComparisonOperator operator = 2;
  double threshold = 3;
}

// AvailabilityState identifies the derived availability state of one subject.
enum AvailabilityState {
  AVAILABILITY_STATE_UNSPECIFIED = 0;
  AVAILABILITY_STATE_AVAILABLE = 1;
  AVAILABILITY_STATE_DEGRADED = 2;
  AVAILABILITY_STATE_UNAVAILABLE = 3;
}

// ComparisonOperator identifies how one query result should be compared to a
// threshold.
enum ComparisonOperator {
  COMPARISON_OPERATOR_UNSPECIFIED = 0;
  COMPARISON_OPERATOR_LT = 1;
  COMPARISON_OPERATOR_LTE = 2;
  COMPARISON_OPERATOR_GT = 3;
  COMPARISON_OPERATOR_GTE = 4;
  COMPARISON_OPERATOR_EQ = 5;
  COMPARISON_OPERATOR_NEQ = 6;
}

// HeaderValueType identifies how one header value should be parsed.
enum HeaderValueType {
  HEADER_VALUE_TYPE_UNSPECIFIED = 0;
  HEADER_VALUE_TYPE_INT64 = 1;
  HEADER_VALUE_TYPE_DOUBLE = 2;
  HEADER_VALUE_TYPE_DURATION_SECONDS = 3;
  HEADER_VALUE_TYPE_UNIX_SECONDS = 4;
  HEADER_VALUE_TYPE_RFC3339_TIMESTAMP = 5;
}
