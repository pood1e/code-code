syntax = "proto3";

package egress.v1;

import "google/protobuf/timestamp.proto";

option go_package = "code-code.internal/go-contract/egress/v1;egressv1";

message EgressPolicy {
  string policy_id = 1;
  string display_name = 2;
  repeated ExternalAccessSet access_sets = 3;
}

message ExternalAccessSet {
  string access_set_id = 1;
  string display_name = 2;
  string owner_service = 3;
  string policy_id = 4;
  repeated ExternalRule external_rules = 5;
  repeated ServiceRule service_rules = 6;
  repeated HttpEgressRoute http_routes = 7;
}

message ExternalRule {
  string external_rule_id = 1;
  string destination_id = 2;
  string display_name = 3;
  HostMatch host_match = 4;
  int32 port = 5;
  EgressProtocol protocol = 6;
  EgressResolution resolution = 7;
  string address_cidr = 9;
}

message ServiceRule {
  string service_rule_id = 1;
  string destination_id = 2;
  repeated string source_service_accounts = 3;
}

message HttpEgressRoute {
  string route_id = 1;
  string display_name = 2;
  string destination_id = 3;
  repeated HttpRouteMatch matches = 4;
  HttpHeaderPolicy request_headers = 5;
  HttpHeaderPolicy response_headers = 6;
  string auth_policy_id = 7;
  bool dynamic_header_authz = 8;
}

message HttpRouteMatch {
  repeated string path_prefixes = 1;
  repeated string methods = 2;
}

message HttpHeaderPolicy {
  repeated HttpHeaderValue add = 1;
  repeated HttpHeaderValue set = 2;
  repeated string remove = 3;
}

message HttpHeaderValue {
  string name = 1;
  string value = 2;
}

message HostMatch {
  oneof kind {
    string host_exact = 1;
    string host_wildcard = 2;
  }
}

message EgressResourceRef {
  string kind = 1;
  string namespace = 2;
  string name = 3;
}

message EgressSyncStatus {
  EgressSyncPhase phase = 1;
  string reason = 2;
  int64 observed_generation = 3;
  EgressResourceRef target_gateway = 4;
  repeated EgressResourceRef applied_resources = 5;
  google.protobuf.Timestamp last_synced_at = 6;
}

enum EgressProtocol {
  EGRESS_PROTOCOL_UNSPECIFIED = 0;
  EGRESS_PROTOCOL_HTTP = 1;
  EGRESS_PROTOCOL_TLS = 2;
  EGRESS_PROTOCOL_TCP = 3;
  EGRESS_PROTOCOL_HTTPS = 4;
}

enum EgressResolution {
  EGRESS_RESOLUTION_UNSPECIFIED = 0;
  EGRESS_RESOLUTION_DNS = 1;
  EGRESS_RESOLUTION_DYNAMIC_DNS = 2;
  EGRESS_RESOLUTION_NONE = 3;
}

enum EgressSyncPhase {
  EGRESS_SYNC_PHASE_UNSPECIFIED = 0;
  EGRESS_SYNC_PHASE_PENDING = 1;
  EGRESS_SYNC_PHASE_SYNCED = 2;
  EGRESS_SYNC_PHASE_FAILED = 3;
}
