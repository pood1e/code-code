syntax = "proto3";

package platform.auth.v1;

import "credential/v1/credential.proto";
import "google/protobuf/timestamp.proto";
import "api_protocol/v1/protocol.proto";
import "platform/auth/v1/egress_auth.proto";
import "platform/management/v1/management.proto";
import "platform/management/v1/credential_subject_summary.proto";

option go_package = "code-code.internal/go-contract/platform/auth/v1;authv1";

service AuthService {
  rpc ListCredentials(ListCredentialsRequest) returns (ListCredentialsResponse);
  rpc CreateAPIKeyCredential(CreateAPIKeyCredentialRequest) returns (CreateAPIKeyCredentialResponse);
  rpc UpdateAPIKeyCredential(UpdateAPIKeyCredentialRequest) returns (UpdateAPIKeyCredentialResponse);
  rpc CreateSessionCredential(CreateSessionCredentialRequest) returns (CreateSessionCredentialResponse);
  rpc UpdateSessionCredential(UpdateSessionCredentialRequest) returns (UpdateSessionCredentialResponse);
  rpc MergeCredentialMaterialValues(MergeCredentialMaterialValuesRequest) returns (MergeCredentialMaterialValuesResponse);
  rpc ReadCredentialMaterialFields(ReadCredentialMaterialFieldsRequest) returns (ReadCredentialMaterialFieldsResponse);
  rpc CreateOAuthCredential(CreateOAuthCredentialRequest) returns (CreateOAuthCredentialResponse);
  rpc UpdateOAuthCredential(UpdateOAuthCredentialRequest) returns (UpdateOAuthCredentialResponse);
  rpc RenameCredential(RenameCredentialRequest) returns (RenameCredentialResponse);
  rpc DeleteCredential(DeleteCredentialRequest) returns (DeleteCredentialResponse);
  rpc ImportOAuthCredential(ImportOAuthCredentialRequest) returns (ImportOAuthCredentialResponse);
  rpc EnsureFresh(EnsureFreshRequest) returns (EnsureFreshResponse);
  rpc RefreshOAuthDue(RefreshOAuthDueRequest) returns (RefreshOAuthDueResponse);
  rpc ScanOAuthSessions(ScanOAuthSessionsRequest) returns (ScanOAuthSessionsResponse);
  rpc GetCredentialSubjectSummary(GetCredentialSubjectSummaryRequest) returns (GetCredentialSubjectSummaryResponse);
  rpc GetCredentialRuntimeProjection(GetCredentialRuntimeProjectionRequest) returns (GetCredentialRuntimeProjectionResponse);
  rpc GetEgressAuthPolicy(GetEgressAuthPolicyRequest) returns (GetEgressAuthPolicyResponse);
  rpc ResolveEgressRequestHeaders(ResolveEgressRequestHeadersRequest) returns (ResolveEgressRequestHeadersResponse);
  rpc ResolveEgressResponseHeaders(ResolveEgressResponseHeadersRequest) returns (ResolveEgressResponseHeadersResponse);
}

message ListCredentialsRequest {}

message ListCredentialsResponse {
  repeated platform.management.v1.CredentialView items = 1;
}

message CreateAPIKeyCredentialRequest {
  string credential_id = 1;
  string display_name = 2;
  string purpose = 3;
  string vendor_id = 4;
  string api_key = 5;
}

message CreateAPIKeyCredentialResponse {
  platform.management.v1.CredentialView credential = 1;
  string status = 2;
}

message UpdateAPIKeyCredentialRequest {
  string credential_id = 1;
  string display_name = 2;
  string purpose = 3;
  string vendor_id = 4;
  string api_key = 5;
}

message UpdateAPIKeyCredentialResponse {
  platform.management.v1.CredentialView credential = 1;
  string status = 2;
}

message CreateSessionCredentialRequest {
  string credential_id = 1;
  string display_name = 2;
  string purpose = 3;
  string vendor_id = 4;
  string schema_id = 5;
  repeated string required_keys = 6;
  map<string, string> values = 7;
  bool merge_values = 8;
}

message CreateSessionCredentialResponse {
  platform.management.v1.CredentialView credential = 1;
  string status = 2;
}

message UpdateSessionCredentialRequest {
  string credential_id = 1;
  string display_name = 2;
  string purpose = 3;
  string vendor_id = 4;
  string schema_id = 5;
  repeated string required_keys = 6;
  map<string, string> values = 7;
  bool merge_values = 8;
}

message UpdateSessionCredentialResponse {
  platform.management.v1.CredentialView credential = 1;
  string status = 2;
}

message MergeCredentialMaterialValuesRequest {
  string credential_id = 1;
  map<string, string> values = 2;
}

message MergeCredentialMaterialValuesResponse {
  string status = 1;
}

message ReadCredentialMaterialFieldsRequest {
  string credential_id = 1;
  repeated string field_ids = 2;
  CredentialMaterialReadPolicyRef policy_ref = 3;
}

message ReadCredentialMaterialFieldsResponse {
  map<string, string> values = 1;
}

message CredentialMaterialReadPolicyRef {
  CredentialMaterialReadPolicyKind kind = 1;
  // owner_id is the support-owned policy subject. For CLI active queries this is
  // cli_id; for vendor active queries this is vendor_id.
  string owner_id = 2;
  // surface_id narrows vendor active query policy to one provider surface
  // binding. CLI active queries may leave this empty.
  string surface_id = 3;
  // collector_id is the active query collector implementation that is requesting
  // material readback. When set, authservice verifies it matches the support
  // policy before releasing material values.
  string collector_id = 4;
}

enum CredentialMaterialReadPolicyKind {
  CREDENTIAL_MATERIAL_READ_POLICY_KIND_UNSPECIFIED = 0;
  CREDENTIAL_MATERIAL_READ_POLICY_KIND_CLI_OAUTH_ACTIVE_QUERY = 1;
  CREDENTIAL_MATERIAL_READ_POLICY_KIND_VENDOR_ACTIVE_QUERY = 2;
}

message CreateOAuthCredentialRequest {
  string credential_id = 1;
  string display_name = 2;
  string purpose = 3;
  string vendor_id = 4;
  string cli_id = 5;
  string access_token = 6;
  string refresh_token = 7;
  string id_token = 8;
  string token_type = 9;
  string account_id = 10;
  repeated string scopes = 11;
  google.protobuf.Timestamp expires_at = 12;
}

message CreateOAuthCredentialResponse {
  platform.management.v1.CredentialView credential = 1;
  string status = 2;
}

message UpdateOAuthCredentialRequest {
  string credential_id = 1;
  string display_name = 2;
  string purpose = 3;
  string vendor_id = 4;
  string cli_id = 5;
  string access_token = 6;
  string refresh_token = 7;
  string id_token = 8;
  string token_type = 9;
  string account_id = 10;
  repeated string scopes = 11;
  google.protobuf.Timestamp expires_at = 12;
}

message UpdateOAuthCredentialResponse {
  platform.management.v1.CredentialView credential = 1;
  string status = 2;
}

message RenameCredentialRequest {
  string credential_id = 1;
  string display_name = 2;
}

message RenameCredentialResponse {
  platform.management.v1.CredentialView credential = 1;
  string status = 2;
}

message DeleteCredentialRequest {
  string credential_id = 1;
}

message DeleteCredentialResponse {
  platform.management.v1.CredentialView credential = 1;
  string status = 2;
}

message OAuthArtifact {
  string access_token = 1;
  string refresh_token = 2;
  string id_token = 3;
  string token_response_json = 4;
  string token_type = 5;
  string account_id = 6;
  string account_email = 7;
  repeated string scopes = 8;
  google.protobuf.Timestamp expires_at = 9;
}

message ImportOAuthCredentialRequest {
  string cli_id = 1;
  string credential_id = 2;
  string display_name = 3;
  reserved 4;
  reserved "network_policy_id";
  OAuthArtifact artifact = 5;
}

message ImportOAuthCredentialResponse {
  credential.v1.CredentialDefinition definition = 1;
}

message EnsureFreshRequest {
  string credential_id = 1;
  int64 min_ttl_seconds = 2;
  bool force_refresh = 3;
}

message EnsureFreshResponse {
  string outcome = 1;
  bool refreshed = 2;
  google.protobuf.Timestamp expires_at = 3;
  google.protobuf.Timestamp next_refresh_after = 4;
  google.protobuf.Timestamp last_refreshed_at = 5;
}

message RefreshOAuthDueRequest {}

message ScanOAuthSessionsRequest {}

message RefreshOAuthDueResponse {
  string status = 1;
}

message ScanOAuthSessionsResponse {
  string status = 1;
}

message GetCredentialSubjectSummaryRequest {
  string credential_id = 1;
}

message GetCredentialSubjectSummaryResponse {
  repeated platform.management.v1.CredentialSubjectSummaryFieldView fields = 1;
}

message GetCredentialRuntimeProjectionRequest {
  string credential_id = 1;
}

message CredentialRuntimeProjection {
  string credential_id = 1;
  credential.v1.CredentialKind credential_kind = 2;
  string vendor_id = 3;
  string cli_id = 4;
}

message GetCredentialRuntimeProjectionResponse {
  CredentialRuntimeProjection credential = 1;
}

message GetEgressAuthPolicyRequest {
  string policy_id = 1;
  string materialization_key = 2;
  credential.v1.CredentialKind credential_kind = 3;
  api_protocol.v1.Protocol protocol = 4;
}

message GetEgressAuthPolicyResponse {
  string policy_id = 1;
  string materialization_key = 2;
  string adapter_id = 3;
  repeated EgressSimpleReplacementRule request_replacement_rules = 4;
  repeated EgressSimpleReplacementRule response_replacement_rules = 5;
  repeated string request_header_names = 6;
  repeated string response_header_names = 7;
  string header_value_prefix = 8;
  string extension_provider_name = 9;
  repeated string headers_to_upstream_on_allow = 10;
  repeated string headers_to_downstream_on_allow = 11;
  repeated string headers_to_downstream_on_deny = 12;
}
