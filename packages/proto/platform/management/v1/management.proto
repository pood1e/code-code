syntax = "proto3";

package platform.management.v1;

import "egress/v1/policy.proto";
import "google/protobuf/timestamp.proto";
import "api_protocol/v1/protocol.proto";
import "provider/v1/provider.proto";
import "platform/agent_profile/v1/agent_profile.proto";
import "platform/management/v1/credential_subject_summary.proto";
import "platform/mcp/v1/mcp.proto";
import "platform/rule/v1/rule.proto";
import "platform/skill/v1/skill.proto";

option go_package = "code-code.internal/go-contract/platform/management/v1;managementv1";

message ListAgentProfilesRequest {}

message ListAgentProfilesResponse {
  repeated AgentProfileListItem items = 1;
}

message AgentProfileListItem {
  string profile_id = 1;
  string name = 2;
  string provider_id = 3;
  string selection_summary = 4;
  int32 mcp_count = 5;
  int32 skill_count = 6;
  int32 rule_count = 7;
}

message GetAgentProfileRequest {
  string profile_id = 1;
}

message GetAgentProfileResponse {
  platform.agent_profile.v1.AgentProfile profile = 1;
  int64 generation = 2;
}

message UpsertAgentProfileRequest {
  string profile_id = 1;
  string name = 2;
  platform.agent_profile.v1.AgentSelectionStrategy selection_strategy = 3;
  repeated string mcp_ids = 4;
  repeated string skill_ids = 5;
  repeated string rule_ids = 6;
}

message CreateAgentProfileRequest {
  UpsertAgentProfileRequest profile = 1;
}

message CreateAgentProfileResponse {
  platform.agent_profile.v1.AgentProfile profile = 1;
}

message UpdateAgentProfileRequest {
  string profile_id = 1;
  UpsertAgentProfileRequest profile = 2;
}

message UpdateAgentProfileResponse {
  platform.agent_profile.v1.AgentProfile profile = 1;
}

message DeleteAgentProfileRequest {
  string profile_id = 1;
}

message DeleteAgentProfileResponse {
  string status = 1;
}

