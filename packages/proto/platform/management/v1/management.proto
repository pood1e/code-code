}

message UpsertRuleRequest {
  string rule_id = 1;
  string name = 2;
  string description = 3;
  string content = 4;
}

message CreateRuleRequest {
  UpsertRuleRequest rule = 1;
}

message CreateRuleResponse {
  platform.rule.v1.Rule rule = 1;
}

message UpdateRuleRequest {
  string rule_id = 1;
  UpsertRuleRequest rule = 2;
