message EgressConfigSource {
  string kind = 1;
  string id = 2;
  string display_name = 3;
  string crd_kind = 4;
}

message EgressConsumer {
  string kind = 1;
  string id = 2;
  string display_name = 3;
  string crd_kind = 4;
}

message ListTemplatesRequest {}

message ListTemplatesResponse {
  repeated TemplateView items = 1;
}

message TemplateView {
  string template_id = 1;
  string display_name = 2;
  string vendor = 3;
  string protocol = 4;
  string default_base_url = 5;
  reserved 6;
  reserved "default_model_id";
  repeated string default_models = 7;
  bool requires_credential = 8;
  reserved 9;
  reserved "supports_discovery";
}

message ApplyTemplateRequest {
  string template_id = 1;
  string namespace = 2;
  string display_name = 3;
  string provider_id = 4;
  reserved 5;
  reserved "selection_priority";
  reserved 6;
  reserved "default_model_id";
  repeated string allowed_model_ids = 7;
  reserved 8;
  reserved "credential_id";
  reserved 9;
  reserved "network_policy_id";
  string provider_credential_id = 10;
}

message ApplyTemplateResult {
  string template_id = 1;
  string namespace = 2;
  string display_name = 3;
  string provider_id = 4;
  repeated string applied_kinds = 5;
  reserved 6;
  reserved "default_model_id";
  reserved 7;
  reserved "allowed_model_ids";
}

message ApplyTemplateResponse {
  ApplyTemplateResult result = 1;
}

message ListVendorsRequest {}

message ListVendorsResponse {
  repeated VendorView items = 1;
}

message VendorView {
  string vendor_id = 1;
  string display_name = 2;
  string icon_url = 3;
  string website_url = 4;
  string description = 5;
  reserved 6;
  reserved "kind";
  repeated string aliases = 7;
}

message ListCLIDefinitionsRequest {}

message ListCLIDefinitionsResponse {
  repeated CLIDefinitionView items = 1;
}

message CLIDefinitionView {
  string cli_id = 1;
  string display_name = 2;
  string icon_url = 3;
  string website_url = 4;
  repeated CLIContainerImageView container_images = 5;
  string description = 6;
  CLIDefinitionCapabilityView capabilities = 7;
}

message CLIContainerImageView {
  string execution_class = 1;
  string image = 2;
  string cpu_request = 3;
  string memory_request = 4;
}

message CLIDefinitionCapabilityView {
  bool supports_streaming = 1;
  bool supports_approval_mode = 2;
  repeated string supported_protocols = 3;
}
