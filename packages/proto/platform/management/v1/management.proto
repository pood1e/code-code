message ListProviderSurfacesRequest {}

message ListProviderSurfacesResponse {
  repeated provider.v1.ProviderSurface items = 1;
}

message ListProvidersRequest {}

message ListProvidersResponse {
  repeated ProviderView items = 1;
}

message ProviderView {
  string provider_id = 1;
  string display_name = 2;
  string vendor_id = 3;
  string provider_credential_id = 4;
  repeated ProviderSurfaceBindingView surfaces = 5;
  string icon_url = 6;
  repeated CredentialSubjectSummaryFieldView credential_subject_summary = 7;
  reserved 9;
  reserved "default_model_id";
  provider.v1.ProviderModelCatalog model_catalog = 10;
  repeated ProviderHostTelemetry host_telemetry = 11;
}

message ListProviderSurfaceBindingsRequest {}

message ListProviderSurfaceBindingsResponse {
  repeated ProviderSurfaceBindingView items = 1;
}

enum ProviderSurfaceBindingPhase {
  PROVIDER_SURFACE_BINDING_PHASE_UNSPECIFIED = 0;
  PROVIDER_SURFACE_BINDING_PHASE_READY = 1;
  PROVIDER_SURFACE_BINDING_PHASE_INVALID_CONFIG = 2;
  PROVIDER_SURFACE_BINDING_PHASE_REFRESHING = 3;
  PROVIDER_SURFACE_BINDING_PHASE_STALE = 4;
  PROVIDER_SURFACE_BINDING_PHASE_ERROR = 5;
}

message ProviderSurfaceBindingStatus {
  ProviderSurfaceBindingPhase phase = 1;
  // reason is an optional human-readable detail for the current phase.
  string reason = 2;
}

enum ProviderHostTelemetryAvailability {
  PROVIDER_HOST_TELEMETRY_AVAILABILITY_UNSPECIFIED = 0;
  PROVIDER_HOST_TELEMETRY_AVAILABILITY_UNKNOWN = 1;
  PROVIDER_HOST_TELEMETRY_AVAILABILITY_REACHABLE = 2;
  PROVIDER_HOST_TELEMETRY_AVAILABILITY_UNREACHABLE = 3;
}

message ProviderHostTelemetry {
  string target_url = 1;
  string host = 2;
  string scheme = 3;
  string port = 4;
  ProviderHostTelemetryAvailability availability = 5;
  double latency_seconds = 6;
  int32 http_status_code = 7;
  google.protobuf.Timestamp sampled_at = 8;
  string reason = 9;
}

message ProviderSurfaceBindingView {
  string display_name = 1;
  string surface_id = 2;
  reserved 4, 5;
  reserved "protocol", "base_url";
  reserved 6;
  reserved "default_model_id";
  reserved 7, 8;
  reserved "allowed_model_ids", "fallback_model_ids";
  reserved 9;
  reserved "selection_priority";
  reserved 10;
  reserved "credential_id";
  reserved 11;
  reserved "network_policy_id";
  reserved 12;
  reserved "vendor_account_id";
  string provider_credential_id = 13;
  provider.v1.ProviderSurfaceRuntime runtime = 14;
  // status carries the observed lifecycle phase derived from provider config
  // validation.
  ProviderSurfaceBindingStatus status = 15;
  string vendor_id = 16;
  string provider_id = 17;
  string provider_display_name = 18;
  ProviderHostTelemetry host_telemetry = 19;
}

message UpsertProviderSurfaceBindingRequest {
  string display_name = 1;
  string surface_id = 2;
  reserved 4, 5;
  reserved "protocol", "base_url";
  reserved 6;
  reserved "default_model_id";
  reserved 7, 8;
  reserved "allowed_model_ids", "fallback_model_ids";
  reserved 9;
  reserved "selection_priority";
  reserved 10;
  reserved "credential_id";
  reserved 11;
  reserved "network_policy_id";
  reserved 12;
  reserved "vendor_account_id";
  string provider_credential_id = 13;
  provider.v1.ProviderSurfaceRuntime runtime = 14;
  string vendor_id = 15;
  string provider_id = 16;
  string provider_display_name = 17;
}

message UpdateProviderRequest {
  string provider_id = 1;
  string display_name = 2;
}

message UpdateProviderResponse {
  ProviderView provider = 1;
}

message ApiKeyAuthenticationUpdateMaterial {
  string api_key = 1;
  reserved 2;
  reserved "observability_token";
}

message CLIOAuthAuthenticationUpdateMaterial {}

message UpdateProviderAuthenticationRequest {
  string provider_id = 1;

  oneof auth_material {
    ApiKeyAuthenticationUpdateMaterial api_key = 2;
    CLIOAuthAuthenticationUpdateMaterial cli_oauth = 3;
  }
}

message UpdateProviderAuthenticationResponse {
  oneof outcome {
    ProviderView provider = 1;
    ProviderConnectSessionView session = 2;
  }
}

message UpdateProviderObservabilityAuthenticationRequest {
  string provider_id = 1;
  SessionMaterial session_material = 2;
}

message UpdateProviderObservabilityAuthenticationResponse {
  ProviderView provider = 1;
}

message DeleteProviderRequest {
  string provider_id = 1;
}

message DeleteProviderResponse {
  string status = 1;
}

message CreateProviderSurfaceBindingRequest {
  UpsertProviderSurfaceBindingRequest surface = 1;
}

message CreateProviderSurfaceBindingResponse {
  ProviderSurfaceBindingView surface = 1;
}

message UpdateProviderSurfaceBindingRequest {
  string surface_id = 1;
  UpsertProviderSurfaceBindingRequest surface = 2;
}

message UpdateProviderSurfaceBindingResponse {
  ProviderSurfaceBindingView surface = 1;
}

message DeleteProviderSurfaceBindingRequest {
  string surface_id = 1;
}

message DeleteProviderSurfaceBindingResponse {
  string status = 1;
}

enum ProviderConnectSessionPhase {
  PROVIDER_CONNECT_SESSION_PHASE_UNSPECIFIED = 0;
  PROVIDER_CONNECT_SESSION_PHASE_PENDING = 1;
  PROVIDER_CONNECT_SESSION_PHASE_AWAITING_USER = 2;
  PROVIDER_CONNECT_SESSION_PHASE_PROCESSING = 3;
  PROVIDER_CONNECT_SESSION_PHASE_SUCCEEDED = 4;
  PROVIDER_CONNECT_SESSION_PHASE_FAILED = 5;
  PROVIDER_CONNECT_SESSION_PHASE_EXPIRED = 6;
  PROVIDER_CONNECT_SESSION_PHASE_CANCELED = 7;
}

enum ProviderAddMethod {
  PROVIDER_ADD_METHOD_UNSPECIFIED = 0;
  PROVIDER_ADD_METHOD_API_KEY = 1;
  PROVIDER_ADD_METHOD_CLI_OAUTH = 2;
}

message ApiKeyConnectMaterial {
  // Secret API key value.
  string api_key = 1;
  reserved 6;
  reserved "observability_token";

  // Concrete base URL chosen by the user. Required only for custom API key
  // connect; vendor-backed API key connect derives fixed base URLs from the
  // vendor support surface.
  string base_url = 2;

  // Concrete protocol used by the generated surface. Required only when
  // vendor_id is empty.
  api_protocol.v1.Protocol protocol = 3;

  // Final surface-scoped model entries to persist onto the created provider
  // surfaces. Each entry carries one surface-local provider_model_id plus one
  // optional authority model binding.
  repeated ProviderSurfaceModelCatalog surface_model_catalogs = 4;

}

message CLIOAuthConnectMaterial {}

message ProviderSurfaceModelCatalog {
  string surface_id = 1;
  repeated provider.v1.ProviderModelCatalogEntry models = 2;
}

message ConnectProviderRequest {
  // Required for vendor-backed API key path. Empty means user-defined custom
  // API key path.
  string vendor_id = 8;

  // Required for CLI OAuth path.
  string cli_id = 9;

  reserved 2;
  reserved "provider_surface_id";
  // Common provider inputs for every add path.
  string display_name = 3;
  reserved 4;
  reserved "network_policy_id";

  // API key and CLI OAuth are the only supported provider add methods.
  ProviderAddMethod add_method = 7;

  oneof auth_material {
    ApiKeyConnectMaterial api_key = 5;
    CLIOAuthConnectMaterial cli_oauth = 6;
  }
}

message ProviderConnectSessionView {
  string session_id = 1;
  string oauth_session_id = 2;
  ProviderConnectSessionPhase phase = 3;
  string display_name = 4;
  string authorization_url = 5;
  string user_code = 6;
  string message = 7;
  string error_message = 8;
  ProviderView provider = 9;
  ProviderAddMethod add_method = 10;
  string vendor_id = 11;
  string cli_id = 12;
}

message ConnectProviderResponse {
  oneof outcome {
    ProviderView provider = 1;
    ProviderConnectSessionView session = 2;
  }
}

message GetProviderConnectSessionRequest {
  string session_id = 1;
}

message GetProviderConnectSessionResponse {
  ProviderConnectSessionView session = 1;
}

enum ProviderOAuthObservabilityProbeOutcome {
  PROVIDER_O_AUTH_OBSERVABILITY_PROBE_OUTCOME_UNSPECIFIED = 0;
  PROVIDER_O_AUTH_OBSERVABILITY_PROBE_OUTCOME_EXECUTED = 1;
  PROVIDER_O_AUTH_OBSERVABILITY_PROBE_OUTCOME_THROTTLED = 2;
  PROVIDER_O_AUTH_OBSERVABILITY_PROBE_OUTCOME_AUTH_BLOCKED = 3;
  PROVIDER_O_AUTH_OBSERVABILITY_PROBE_OUTCOME_UNSUPPORTED = 4;
  PROVIDER_O_AUTH_OBSERVABILITY_PROBE_OUTCOME_FAILED = 5;
}

enum ProviderObservabilityProbeTrigger {
  PROVIDER_OBSERVABILITY_PROBE_TRIGGER_UNSPECIFIED = 0;
  PROVIDER_OBSERVABILITY_PROBE_TRIGGER_MANUAL = 1;
  PROVIDER_OBSERVABILITY_PROBE_TRIGGER_CONNECT = 2;
  PROVIDER_OBSERVABILITY_PROBE_TRIGGER_SCHEDULE = 3;
}

message ProbeProviderObservabilityRequest {
  string provider_id = 1;
  ProviderObservabilityProbeTrigger trigger = 2;
  repeated string provider_ids = 3;
}

message ProbeProviderObservabilityResponse {
  string provider_id = 1;
  string cli_id = 2;
  ProviderOAuthObservabilityProbeOutcome outcome = 3;
  string message = 4;
  string next_allowed_at = 5;
  string last_attempt_at = 6;
  repeated string provider_ids = 7;
  string workflow_id = 8;
}

enum ProviderStatusEventKind {
  PROVIDER_STATUS_EVENT_KIND_UNSPECIFIED = 0;
  PROVIDER_STATUS_EVENT_KIND_WORKFLOW = 1;
  PROVIDER_STATUS_EVENT_KIND_SURFACE_BINDING_STATUS = 2;
}

enum ProviderWorkflowPhase {
  PROVIDER_WORKFLOW_PHASE_UNSPECIFIED = 0;
  PROVIDER_WORKFLOW_PHASE_PENDING = 1;
  PROVIDER_WORKFLOW_PHASE_RUNNING = 2;
  PROVIDER_WORKFLOW_PHASE_SUCCEEDED = 3;
  PROVIDER_WORKFLOW_PHASE_FAILED = 4;
  PROVIDER_WORKFLOW_PHASE_ERROR = 5;
  PROVIDER_WORKFLOW_PHASE_CANCELED = 6;
}

message ProviderWorkflowStatus {
  string workflow_id = 1;
  string workflow_kind = 2;
  ProviderWorkflowPhase phase = 3;
  string message = 4;
  google.protobuf.Timestamp started_at = 5;
  google.protobuf.Timestamp finished_at = 6;
}

message ProviderStatusEvent {
  string provider_id = 1;
  string surface_id = 2;
  ProviderStatusEventKind kind = 3;
  ProviderWorkflowStatus workflow = 4;
  ProviderSurfaceBindingStatus surface_binding_status = 5;
  google.protobuf.Timestamp occurred_at = 6;
}

message ListCredentialsRequest {}

message ListCredentialsResponse {
  repeated CredentialView items = 1;
}

message CredentialStatus {
  bool material_ready = 1;
  // reason is an optional human-readable detail when material_ready is false.
  string reason = 2;
}

message CredentialView {
  string credential_id = 1;
  string display_name = 2;
  string kind = 3;
  string purpose = 4;
  string vendor_id = 5;
  string cli_id = 6;
  string account_email = 8;
  int64 credential_generation = 9;
  string expires_at = 10;
  reserved 11;
  reserved "api_key_surfaces";
  CredentialStatus status = 12;
}

message UpsertCredentialRequest {
  string credential_id = 1;
  string display_name = 2;
  string kind = 3;
  string purpose = 4;
  string vendor_id = 5;
  string cli_id = 6;
  // Fields 5-9 replaced by oneof material.
  reserved 7, 8, 9;
  oneof material {
    ApiKeyMaterial api_key_material = 10;
    OAuthMaterial oauth_material = 11;
    SessionMaterial session_material = 12;
  }
}

// ApiKeyMaterial carries the secret material for an API key credential.
message ApiKeyMaterial {
  string api_key = 1;
  reserved 2;
  reserved "surfaces";
}

// OAuthMaterial carries the secret material for an OAuth credential.
message OAuthMaterial {
  string access_token = 1;
  string token_type = 2;
  string account_id = 3;
  repeated string scopes = 4;
  string expires_at = 5;
}

// SessionMaterial carries management-plane session auth fields.
message SessionMaterial {
  string schema_id = 1;
  map<string, string> values = 2;
  repeated string required_keys = 3;
}

message CreateCredentialRequest {
  UpsertCredentialRequest credential = 1;
}

message CreateCredentialResponse {
  CredentialView credential = 1;
}

message UpdateCredentialRequest {
  string credential_id = 1;
  UpsertCredentialRequest credential = 2;
}

message UpdateCredentialResponse {
  CredentialView credential = 1;
}

message DeleteCredentialRequest {
  string credential_id = 1;
}

message DeleteCredentialResponse {
  string status = 1;
}

