syntax = "proto3";

package credential.v1;

import "credential/v1/credential.proto";
import "google/protobuf/timestamp.proto";

option go_package = "code-code.internal/go-contract/credential/v1;credentialv1";

enum OAuthAuthorizationFlow {
  O_AUTH_AUTHORIZATION_FLOW_UNSPECIFIED = 0;
  O_AUTH_AUTHORIZATION_FLOW_CODE = 1;
  O_AUTH_AUTHORIZATION_FLOW_DEVICE = 2;
}

enum OAuthCallbackMode {
  O_AUTH_CALLBACK_MODE_UNSPECIFIED = 0;
  O_AUTH_CALLBACK_MODE_HOSTED_CALLBACK = 1;
  O_AUTH_CALLBACK_MODE_LOCALHOST_RELAY = 2;
}

enum OAuthAuthorizationPhase {
  O_AUTH_AUTHORIZATION_PHASE_UNSPECIFIED = 0;
  O_AUTH_AUTHORIZATION_PHASE_PENDING = 1;
  O_AUTH_AUTHORIZATION_PHASE_AWAITING_USER = 2;
  O_AUTH_AUTHORIZATION_PHASE_PROCESSING = 3;
  O_AUTH_AUTHORIZATION_PHASE_SUCCEEDED = 4;
  O_AUTH_AUTHORIZATION_PHASE_FAILED = 5;
  O_AUTH_AUTHORIZATION_PHASE_EXPIRED = 6;
  O_AUTH_AUTHORIZATION_PHASE_CANCELED = 7;
}

enum OAuthAuthorizationConditionStatus {
  O_AUTH_AUTHORIZATION_CONDITION_STATUS_UNSPECIFIED = 0;
  O_AUTH_AUTHORIZATION_CONDITION_STATUS_TRUE = 1;
  O_AUTH_AUTHORIZATION_CONDITION_STATUS_FALSE = 2;
  O_AUTH_AUTHORIZATION_CONDITION_STATUS_UNKNOWN = 3;
}

message OAuthAuthorizationSessionRef {
  string session_id = 1;
}

message ImportedCredentialSummary {
  string credential_id = 1;
  string display_name = 2;
  CredentialKind kind = 3;
}

message OAuthAuthorizationSessionSpec {
  string session_id = 1;
  string cli_id = 2;
  OAuthAuthorizationFlow flow = 3;
  reserved 4;
  reserved "network_policy_id";
  OAuthCallbackMode callback_mode = 5;
  string provider_redirect_uri = 6;
  string target_credential_id = 7;
  string target_display_name = 8;
}

message OAuthAuthorizationSessionCondition {
  string type = 1;
  OAuthAuthorizationConditionStatus status = 2;
  string reason = 3;
  string message = 4;
  int64 observed_generation = 5;
  google.protobuf.Timestamp last_transition_time = 6;
}

message OAuthAuthorizationSessionStatus {
  OAuthAuthorizationPhase phase = 1;
  string authorization_url = 2;
  string user_code = 3;
  int32 poll_interval_seconds = 4;
  google.protobuf.Timestamp expires_at = 5;
  ImportedCredentialSummary imported_credential = 6;
  int64 observed_generation = 7;
  repeated OAuthAuthorizationSessionCondition conditions = 8;
  string message = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message OAuthAuthorizationSessionState {
  int64 generation = 1;
  OAuthAuthorizationSessionSpec spec = 2;
  OAuthAuthorizationSessionStatus status = 3;
}
