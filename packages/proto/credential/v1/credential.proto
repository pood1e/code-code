syntax = "proto3";

package credential.v1;

import "google/protobuf/timestamp.proto";

option go_package = "code-code.internal/go-contract/credential/v1;credentialv1";

// CredentialRef references a credential by stable identity.
message CredentialRef {
  string credential_id = 1;
}

message CredentialGrantRef {
  string grant_id = 1;
}

// CredentialKind identifies the semantic kind of one credential.
enum CredentialKind {
  CREDENTIAL_KIND_UNSPECIFIED = 0;
  CREDENTIAL_KIND_API_KEY = 1;
  CREDENTIAL_KIND_OAUTH = 2;
  CREDENTIAL_KIND_SESSION = 3;
}

// CredentialPurpose documents the intended use of a credential.
// This is informational and does not restrict actual usage; it helps the
// console UI guide users toward the right credential for each slot.
enum CredentialPurpose {
  CREDENTIAL_PURPOSE_UNSPECIFIED = 0;
  // Data-plane: used for LLM inference requests.
  CREDENTIAL_PURPOSE_DATA_PLANE = 1;
  // Management-plane: used for quota, usage, billing queries.
  CREDENTIAL_PURPOSE_MANAGEMENT_PLANE = 2;
}

// CredentialDefinition describes one credential resource owned by the platform.
message CredentialDefinition {
  string credential_id = 1;
  string display_name = 2;
  CredentialKind kind = 3;

  // Intended purpose. Helps the console UI guide users.
  CredentialPurpose purpose = 4;

  // Provider vendor identity when this credential is bound to one known
  // vendor. Empty means unspecified vendor.
  string vendor_id = 5;

  reserved 6;
  reserved "cli_id";
  reserved 10;
  reserved "api_key_metadata";

  // Kind-specific management metadata.
  oneof kind_metadata {
    OAuthMetadata oauth_metadata = 11;
    SessionMetadata session_metadata = 12;
  }
}

// OAuthMetadata stores the user-declared CLI OAuth binding.
// Controller-owned lifecycle fields (credential_generation, next_refresh_after,
// last_refreshed_at, account_email) live exclusively in CRD status.
message OAuthMetadata {
  // CLI owner identifier (e.g. "codex", "qwen"). Determines
  // which CLI OAuth contract and refresh method to use.
  string cli_id = 1;

  // Fields 2-5 moved to CRD status (CredentialOAuthStatus).
  reserved 2, 3, 4, 5;
  reserved "account_email", "credential_generation", "next_refresh_after", "last_refreshed_at";
}

// SessionMetadata stores one session credential schema binding.
message SessionMetadata {
  string schema_id = 1;
  repeated string required_keys = 2;
}

// ResolvedCredential describes the provider-ready auth material resolved from
// one credential reference.
message ResolvedCredential {
  string credential_id = 1;
  CredentialKind kind = 2;
  oneof material {
    ApiKeyCredential api_key = 3;
    OAuthCredential oauth = 4;
    SessionCredential session = 5;
  }
  string grant_id = 6;
}

// ApiKeyCredential describes one resolved API key credential.
message ApiKeyCredential {
  string api_key = 1;
}

// OAuthCredential describes one resolved OAuth credential.
message OAuthCredential {
  string access_token = 1;
  string token_type = 2;
  google.protobuf.Timestamp expires_at = 3;
  string account_id = 4;
  repeated string scopes = 5;
  string refresh_token = 6;
  string id_token = 7;
  reserved 8, 9, 10;
  reserved "account_email", "credential_generation", "refreshed_at";
}

// SessionCredential describes one resolved management-plane session credential.
message SessionCredential {
  string schema_id = 1;
  map<string, string> values = 2;
}
