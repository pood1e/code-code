worker_processes auto;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  server_tokens off;

  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_comp_level 4;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    application/xml
    text/xml
    application/xml+rss
    text/javascript
    image/svg+xml;
  gzip_vary on;

  client_body_temp_path /tmp/client_temp;
  proxy_temp_path /tmp/proxy_temp;
  fastcgi_temp_path /tmp/fastcgi_temp;
  uwsgi_temp_path /tmp/uwsgi_temp;
  scgi_temp_path /tmp/scgi_temp;

  server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers applied to all responses not overriding add_header below.
    # Blocks with their own add_header must repeat these (nginx inheritance rule).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /healthz {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    # Block source map files from being served.
    location ~* \.map$ {
      return 404;
    }

    location ~* \.(js|css|mjs|json|woff2?|woff|ttf|otf|eot|png|jpg|jpeg|gif|svg|webp)$ {
      access_log off;
      expires 365d;
      add_header Cache-Control "public, max-age=31536000, immutable" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      try_files $uri =404;
    }

    location ~* \.html$ {
      add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      try_files $uri /index.html;
    }

    location /api/ {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://console-api:8080;
    }

    location /otlp/ {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # Resolved at container startup via entrypoint envsubst.
      proxy_pass OTEL_COLLECTOR_ENDPOINT_PLACEHOLDER/;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
