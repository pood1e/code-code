{{- if and .Values.prometheus.enabled .Values.blackbox.enabled .Values.providerHostTelemetry.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: provider-host-blackbox-exporter
  namespace: {{ .Values.global.platformNamespace }}
  labels:
{{ include "infrastructure.labels" (dict "root" . "name" "provider-host-blackbox-exporter" "componentLabel" "metrics") | nindent 4 }}
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: provider-host-blackbox-exporter-config
  namespace: {{ .Values.global.platformNamespace }}
  labels:
{{ include "infrastructure.labels" (dict "root" . "name" "provider-host-blackbox-exporter" "componentLabel" "metrics") | nindent 4 }}
data:
  config.yml: |-
    modules:
      {{ .Values.providerHostTelemetry.module }}:
        prober: http
        timeout: {{ .Values.providerHostTelemetry.moduleTimeout }}
        http:
          method: GET
          preferred_ip_protocol: ip4
          valid_status_codes:
{{- range untilStep 200 500 1 }}
            - {{ . }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: provider-host-blackbox-exporter
  namespace: {{ .Values.global.platformNamespace }}
  labels:
{{ include "infrastructure.labels" (dict "root" . "name" "provider-host-blackbox-exporter" "componentLabel" "metrics") | nindent 4 }}
spec:
  selector:
{{ include "infrastructure.selectorLabels" (dict "root" . "name" "provider-host-blackbox-exporter") | nindent 4 }}
  ports:
    - name: http-metrics
      port: 9115
      targetPort: metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: provider-host-blackbox-exporter
  namespace: {{ .Values.global.platformNamespace }}
  labels:
{{ include "infrastructure.labels" (dict "root" . "name" "provider-host-blackbox-exporter" "componentLabel" "metrics") | nindent 4 }}
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
{{ include "infrastructure.selectorLabels" (dict "root" . "name" "provider-host-blackbox-exporter") | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "infrastructure.labels" (dict "root" . "name" "provider-host-blackbox-exporter" "componentLabel" "metrics") | nindent 8 }}
    spec:
      serviceAccountName: provider-host-blackbox-exporter
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: provider-host-blackbox-exporter
          image: {{ .Values.blackbox.image }}
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/blackbox-exporter/config.yml
            - --web.listen-address=:9115
          ports:
            - name: metrics
              containerPort: 9115
          volumeMounts:
            - name: config
              mountPath: /etc/blackbox-exporter
              readOnly: true
{{- include "infrastructure.httpProbes" (dict "readyPath" "/metrics" "livePath" "/metrics" "port" "metrics" "startupFailureThreshold" 24) | nindent 10 }}
          securityContext:
{{- include "infrastructure.containerSecurityContext" (dict "readOnlyRootFilesystem" true "runAsUser" 65534 "runAsGroup" 65534) | nindent 12 }}
          resources:
{{ toYaml .Values.providerHostTelemetry.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: provider-host-blackbox-exporter-config
{{- end }}
