  revisionHistoryLimit: 2
  progressDeadlineSeconds: 300
  selector:
    matchLabels:
{{ include "platform.selectorLabels" (dict "root" . "name" $wecom.name) | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "platform.labels" (dict "root" . "name" $wecom.name "componentLabel" "inbound-message-adapter") | nindent 8 }}
    spec:
