---
{{- if .Values.notificationDispatcher.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-notifications
  labels:
{{ include "platform.labels" (dict "root" . "name" $dispatcher.name "componentLabel" "inbound-message-adapter") | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: {{ .Values.notificationDispatcher.ingress.proxyBodySize | quote }}
spec:
  ingressClassName: {{ .Values.notificationDispatcher.ingress.className }}
  tls:
    - hosts:
{{ toYaml .Values.notificationDispatcher.ingress.hosts | nindent 8 }}
      secretName: {{ .Values.notificationDispatcher.ingress.tlsSecretName }}
  rules:
{{- range $host := .Values.notificationDispatcher.ingress.hosts }}
    - host: {{ $host }}
      http:
        paths:
          - path: /wecom/callback
            pathType: Exact
            backend:
              service:
                name: {{ $wecom.name }}
                port:
                  number: 8080
          - path: /wecom/robots/default/callback
            pathType: Exact
            backend:
              service:
                name: {{ $robot.name }}
                port:
                  number: 8080
{{- end }}
{{- end }}
{{- end }}
