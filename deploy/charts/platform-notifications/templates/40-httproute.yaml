{{- if and .Values.notificationDispatcher.enabled .Values.notificationDispatcher.route.enabled }}
{{- $values := .Values.notificationDispatcher }}
{{- $route := $values.route }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: platform-notifications
  labels:
{{ include "platform.labels" (dict "root" . "name" $values.dispatcher.name "componentLabel" "inbound-message-adapter") | nindent 4 }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $route.parentRef.name }}
      namespace: {{ $route.parentRef.namespace }}
      sectionName: {{ $route.parentRef.sectionName }}
  hostnames:
{{- range $host := $route.hosts }}
    - {{ $host | quote }}
{{- end }}
  rules:
    - matches:
        - path:
            type: Exact
            value: /wecom/callback
      backendRefs:
        - name: {{ $values.wecomCallbackAdapter.name }}
          port: 8080
    - matches:
        - path:
            type: Exact
            value: /wecom/robots/default/callback
      backendRefs:
        - name: {{ $values.wecomRobotDefaultCallbackAdapter.name }}
          port: 8080
{{- end }}
