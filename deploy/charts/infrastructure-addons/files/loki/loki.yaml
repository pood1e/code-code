# Local single-binary configuration based on Loki official examples.
auth_enabled: false

server:
  http_listen_port: 3100

common:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory
  replication_factor: 1
  path_prefix: /var/loki

schema_config:
  configs:
    - from: "2024-04-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  filesystem:
    directory: /var/loki/chunks

ingester:
  wal:
    enabled: true
    dir: /var/loki/wal

compactor:
  working_directory: /var/loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

limits_config:
  allow_structured_metadata: true
  volume_enabled: true
  retention_period: {{ .Values.loki.retentionPeriod | quote }}

analytics:
  reporting_enabled: false
