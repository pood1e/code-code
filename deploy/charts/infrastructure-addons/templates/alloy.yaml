{{- if .Values.alloy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: {{ .Values.global.observabilityNamespace }}
  labels:
{{ include "infrastructure.labels" (dict "root" . "name" "alloy" "componentLabel" "logging") | nindent 4 }}
data:
  config.alloy: |-
{{ tpl (.Files.Get "files/alloy/config.alloy") . | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy
  namespace: {{ .Values.global.observabilityNamespace }}
  labels:
{{ include "infrastructure.labels" (dict "root" . "name" "alloy" "componentLabel" "logging") | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ printf "%s-alloy" .Release.Name }}
  labels:
{{ include "infrastructure.labels" (dict "root" . "name" "alloy" "componentLabel" "logging") | nindent 4 }}
rules:
  - apiGroups:
      - ""
      - discovery.k8s.io
      - networking.k8s.io
    resources:
      - endpoints
      - endpointslices
      - ingresses
      - pods
      - services
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - events
      - namespaces
      - pods
      - pods/log
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ printf "%s-alloy" .Release.Name }}
  labels:
{{ include "infrastructure.labels" (dict "root" . "name" "alloy" "componentLabel" "logging") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ printf "%s-alloy" .Release.Name }}
subjects:
  - kind: ServiceAccount
    name: alloy
    namespace: {{ .Values.global.observabilityNamespace }}
---
apiVersion: v1
kind: Service
metadata:
  name: alloy
  namespace: {{ .Values.global.observabilityNamespace }}
  labels:
{{ include "infrastructure.labels" (dict "root" . "name" "alloy" "componentLabel" "logging") | nindent 4 }}
spec:
  selector:
{{ include "infrastructure.selectorLabels" (dict "root" . "name" "alloy") | nindent 4 }}
  ports:
    - name: http
      port: 12345
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy
  namespace: {{ .Values.global.observabilityNamespace }}
  labels:
{{ include "infrastructure.labels" (dict "root" . "name" "alloy" "componentLabel" "logging") | nindent 4 }}
spec:
  revisionHistoryLimit: 2
  progressDeadlineSeconds: 600
  replicas: 1
  selector:
    matchLabels:
{{ include "infrastructure.selectorLabels" (dict "root" . "name" "alloy") | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "infrastructure.labels" (dict "root" . "name" "alloy" "componentLabel" "logging") | nindent 8 }}
{{ include "infrastructure.observabilityAmbientPodLabels" (dict "root" .) | nindent 8 }}
    spec:
      serviceAccountName: alloy
      terminationGracePeriodSeconds: 30
      containers:
        - name: alloy
          image: {{ .Values.alloy.image }}
          imagePullPolicy: IfNotPresent
          args:
            - run
            - --server.http.listen-addr=0.0.0.0:12345
            - --storage.path=/var/lib/alloy/data
            - /etc/alloy/config.alloy
          ports:
            - name: http
              containerPort: 12345
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
              readOnly: true
            - name: data
              mountPath: /var/lib/alloy/data
          startupProbe:
            httpGet:
              path: /-/ready
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /-/ready
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 473
            runAsGroup: 473
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
              ephemeral-storage: 1Gi
      volumes:
        - name: config
          configMap:
            name: alloy-config
        - name: data
          emptyDir:
            sizeLimit: 1Gi
{{- end }}
