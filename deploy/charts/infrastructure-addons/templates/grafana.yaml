{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: {{ .Values.global.observabilityNamespace }}
  labels:
{{ include "infrastructure.labels" (dict "root" . "name" "grafana" "componentLabel" "dashboard") | nindent 4 }}
data:
  datasources.yaml: |-
{{ tpl (.Files.Get "files/grafana/datasources.yaml") . | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: {{ .Values.global.observabilityNamespace }}
  labels:
{{ include "infrastructure.labels" (dict "root" . "name" "grafana" "componentLabel" "dashboard") | nindent 4 }}
data:
{{ (.Files.Glob "files/grafana/provisioning/*.yaml").AsConfig | nindent 2 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-platform
  namespace: {{ .Values.global.observabilityNamespace }}
  labels:
{{ include "infrastructure.labels" (dict "root" . "name" "grafana" "componentLabel" "dashboard") | nindent 4 }}
data:
{{ (.Files.Glob "files/grafana/dashboards/*.json").AsConfig | nindent 2 }}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: {{ .Values.global.observabilityNamespace }}
  labels:
{{ include "infrastructure.labels" (dict "root" . "name" "grafana" "componentLabel" "dashboard") | nindent 4 }}
spec:
  type: {{ .Values.grafana.service.type }}
  selector:
{{ include "infrastructure.selectorLabels" (dict "root" . "name" "grafana") | nindent 4 }}
  ports:
    - name: http
      port: 3000
      targetPort: http
      {{- if eq .Values.grafana.service.type "NodePort" }}
      nodePort: {{ .Values.grafana.service.nodePort }}
      {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: {{ .Values.global.observabilityNamespace }}
  labels:
{{ include "infrastructure.labels" (dict "root" . "name" "grafana" "componentLabel" "dashboard") | nindent 4 }}
spec:
  revisionHistoryLimit: 2
  progressDeadlineSeconds: 600
  replicas: 1
  selector:
    matchLabels:
{{ include "infrastructure.selectorLabels" (dict "root" . "name" "grafana") | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "infrastructure.labels" (dict "root" . "name" "grafana" "componentLabel" "dashboard") | nindent 8 }}
{{ include "infrastructure.observabilityAmbientPodLabels" (dict "root" .) | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 5
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 472
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: grafana
          image: {{ .Values.grafana.image }}
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: {{ .Values.global.grafanaAdminSecretName }}
          env:
            - name: GF_SERVER_ROOT_URL
              value: {{ .Values.grafana.rootUrl | quote }}
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: {{ ternary "false" "true" (eq (trimSuffix "/" .Values.grafana.rootUrl) "") | quote }}
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
            - name: GF_LOG_LEVEL
              value: "warn"
            - name: GF_SERVER_ROUTER_LOGGING
              value: "false"
            - name: GF_ALERTING_ENABLED
              value: "false"
            - name: GF_UNIFIED_ALERTING_ENABLED
              value: "false"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: {{ .Values.grafana.anonymousOrgRole | quote }}
            - name: GF_USERS_VIEWERS_CAN_EDIT
              value: {{ ternary "true" "false" .Values.grafana.viewersCanEdit | quote }}
            - name: GF_EXPLORE_ENABLED
              value: {{ ternary "true" "false" .Values.grafana.exploreEnabled | quote }}
            - name: GF_AUTH_DISABLE_LOGIN_FORM
              value: "true"
            - name: GF_SECURITY_ALLOW_EMBEDDING
              value: "true"
          ports:
            - name: http
              containerPort: 3000
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: dashboard-providers
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards/code-code
              readOnly: true
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 5
            timeoutSeconds: 10
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 472
            runAsGroup: 472
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
              ephemeral-storage: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
              ephemeral-storage: 1Gi
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-providers
          configMap:
            name: grafana-dashboard-providers
        - name: dashboards
          configMap:
            name: grafana-dashboards-platform
{{- end }}
