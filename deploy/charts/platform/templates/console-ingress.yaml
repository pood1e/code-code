{{- if .Values.consoleIngress.enabled }}
{{- $hosts := list .Values.consoleIngress.host -}}
{{- range $extra := .Values.consoleIngress.extraHosts }}
{{- $hosts = append $hosts $extra -}}
{{- end }}
{{- $hosts = uniq $hosts -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: console
  labels:
{{ include "platform.labels" (dict "root" . "name" "console" "componentLabel" "ingress") | nindent 4 }}
  {{- if not .Values.consoleIngress.sslRedirect }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  {{- end }}
spec:
  ingressClassName: nginx
  {{- if .Values.consoleIngress.tlsEnabled }}
  tls:
    - hosts:
{{- range $host := $hosts }}
        - {{ $host }}
{{- end }}
      secretName: {{ .Values.consoleIngress.tlsSecretName }}
  {{- else }}
  tls: []
  {{- end }}
  rules:
{{- range $host := $hosts }}
    - host: {{ $host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: console-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: console-web
                port:
                  number: 8080
{{- end }}
{{- end }}
