{{- range $key := keys .Values.components | sortAlpha }}
{{- $component := index $.Values.components $key }}
{{- if $component.enabled }}
{{- $deploymentDefaults := $.Values.defaults.deployment }}
{{- $resources := default $.Values.defaults.resources $component.resources }}
{{- $containerSecurityContext := default $.Values.defaults.containerSecurityContext $component.containerSecurityContext }}
{{- $lifecycle := default $.Values.defaults.lifecycle $component.lifecycle }}
{{- $serviceAccountName := include "platform.serviceAccountName" (dict "component" $component) | trim }}
{{- $componentNamespace := include "platform.componentNamespace" (dict "root" $ "component" $component) | trim }}
{{- $imageTag := default $.Values.global.imageTag $component.imageTag }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $component.name }}
  namespace: {{ $componentNamespace }}
  labels:
{{ include "platform.labels" (dict "root" $ "name" $component.name "componentLabel" $component.componentLabel "imageTag" $imageTag) | nindent 4 }}
spec:
  revisionHistoryLimit: {{ default $deploymentDefaults.revisionHistoryLimit $component.revisionHistoryLimit }}
  progressDeadlineSeconds: {{ default $deploymentDefaults.progressDeadlineSeconds $component.progressDeadlineSeconds }}
  replicas: {{ default $deploymentDefaults.replicas $component.replicas }}
  strategy:
{{ toYaml (default $deploymentDefaults.strategy $component.strategy) | nindent 4 }}
  selector:
    matchLabels:
{{ include "platform.selectorLabels" (dict "root" $ "name" $component.name) | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "platform.labels" (dict "root" $ "name" $component.name "componentLabel" $component.componentLabel "imageTag" $imageTag) | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: {{ default $deploymentDefaults.terminationGracePeriodSeconds $component.terminationGracePeriodSeconds }}
      {{- if $serviceAccountName }}
      serviceAccountName: {{ $serviceAccountName }}
      {{- end }}
      {{- if hasKey $component "podAutomountServiceAccountToken" }}
      automountServiceAccountToken: {{ $component.podAutomountServiceAccountToken }}
      {{- end }}
      {{- if $component.podSecurityContext }}
      securityContext:
{{ toYaml $component.podSecurityContext | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $component.name }}
          image: {{ include "platform.image" (dict "root" $ "imageName" $component.imageName "imageRegistry" $component.imageRegistry "imageTag" $component.imageTag) }}
          imagePullPolicy: {{ default "IfNotPresent" $component.imagePullPolicy }}
          {{- if or $component.env $component.egressTrustBundle $component.databaseUrl $component.internalActionToken }}
          env:
{{ include "platform.renderEnv" (dict "root" $ "component" $component "env" $component.env "egressTrustBundle" $component.egressTrustBundle "databaseUrl" $component.databaseUrl "internalActionToken" $component.internalActionToken) | nindent 12 }}
          {{- if and $component.env (hasKey $component.env "OTEL_EXPORTER_OTLP_ENDPOINT") }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ default "grpc" $.Values.global.otlpProtocol | quote }}
            - name: OTEL_EXPORTER_OTLP_TRACES_PROTOCOL
              value: {{ default "grpc" $.Values.global.otlpProtocol | quote }}
            - name: OTEL_EXPORTER_OTLP_METRICS_PROTOCOL
              value: {{ default "grpc" $.Values.global.otlpProtocol | quote }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: {{ printf "service.namespace=%s,k8s.namespace.name=%s" $componentNamespace $componentNamespace | quote }}
            - name: OTEL_TRACES_ENABLED
              value: {{ ternary "true" "false" (default false $.Values.global.tracesEnabled) | quote }}
          {{- end }}
          {{- end }}
          {{- if or $component.containerPorts $component.portPreset }}
          ports:
{{ include "platform.renderContainerPorts" (dict "ports" $component.containerPorts "portPreset" $component.portPreset) | nindent 12 }}
          {{- end }}
          {{- if $lifecycle }}
          lifecycle:
{{ toYaml $lifecycle | nindent 12 }}
          {{- end }}
          {{- if $component.probePreset }}
          {{- $probePreset := include "platform.probePreset" (dict "preset" $component.probePreset) | fromYaml }}
          startupProbe:
{{ toYaml $probePreset.startupProbe | nindent 12 }}
          readinessProbe:
{{ toYaml $probePreset.readinessProbe | nindent 12 }}
          livenessProbe:
{{ toYaml $probePreset.livenessProbe | nindent 12 }}
          {{- else }}
          {{- if $component.startupProbe }}
          startupProbe:
{{ toYaml $component.startupProbe | nindent 12 }}
          {{- end }}
          {{- if $component.readinessProbe }}
          readinessProbe:
{{ toYaml $component.readinessProbe | nindent 12 }}
          {{- end }}
          {{- if $component.livenessProbe }}
          livenessProbe:
{{ toYaml $component.livenessProbe | nindent 12 }}
          {{- end }}
          {{- end }}
          securityContext:
{{ toYaml $containerSecurityContext | nindent 12 }}
          resources:
{{ toYaml $resources | nindent 12 }}
          {{- if or $component.volumeMounts $component.egressTrustBundle }}
          volumeMounts:
{{ include "platform.renderVolumeMounts" (dict "mounts" $component.volumeMounts "egressTrustBundle" $component.egressTrustBundle) | nindent 12 }}
          {{- end }}
      {{- if or $component.volumes $component.egressTrustBundle }}
      volumes:
{{ include "platform.renderVolumes" (dict "root" $ "volumes" $component.volumes "egressTrustBundle" $component.egressTrustBundle) | nindent 8 }}
      {{- end }}
---
{{- end }}
{{- end }}
