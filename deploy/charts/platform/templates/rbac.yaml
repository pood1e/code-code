{{- range $key := keys .Values.components | sortAlpha }}
{{- $component := index $.Values.components $key }}
{{- $rbac := $component.rbac | default dict }}
{{- if and $component.enabled $rbac.enabled }}
{{- $componentNamespace := include "platform.componentNamespace" (dict "root" $ "component" $component) | trim }}
{{- $serviceAccountName := include "platform.serviceAccountName" (dict "component" $component) | trim }}
apiVersion: rbac.authorization.k8s.io/v1
kind: {{ ternary "ClusterRole" "Role" $rbac.clusterWide }}
metadata:
  name: {{ $rbac.name }}
  {{- if not $rbac.clusterWide }}
  namespace: {{ $componentNamespace }}
  {{- end }}
  labels:
{{ include "platform.labels" (dict "root" $ "name" $component.name "componentLabel" $component.componentLabel) | nindent 4 }}
rules:
{{ toYaml $rbac.rules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: {{ ternary "ClusterRoleBinding" "RoleBinding" $rbac.clusterWide }}
metadata:
  name: {{ $rbac.name }}
  {{- if not $rbac.clusterWide }}
  namespace: {{ $componentNamespace }}
  {{- end }}
  labels:
{{ include "platform.labels" (dict "root" $ "name" $component.name "componentLabel" $component.componentLabel) | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ $serviceAccountName }}
    namespace: {{ $componentNamespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: {{ ternary "ClusterRole" "Role" $rbac.clusterWide }}
  name: {{ $rbac.name }}
---
{{- end }}
{{- end }}
