apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: control-plane-default-deny-egress
spec:
  podSelector: {}
  policyTypes:
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: control-plane-egress
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: code-code
          podSelector: {}
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
        - ipBlock:
            cidr: 172.16.0.0/12
        - ipBlock:
            cidr: 192.168.0.0/16
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: code-code-infra
          podSelector: {}
      ports:
        - protocol: TCP
          port: 4222
        - protocol: TCP
          port: 4318
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 9090
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: code-code-runs
          podSelector:
            matchLabels:
              code-code.internal/runtime: platform-lightweight-http-workflow
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: code-code-net
      ports:
        - protocol: TCP
          port: 443
