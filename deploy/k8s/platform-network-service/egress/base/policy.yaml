apiVersion: v1
kind: ConfigMap
metadata:
  name: code-code-egress-policy
  namespace: code-code
  labels:
    app.kubernetes.io/name: code-code-egress
    app.kubernetes.io/component: egress-gateway
    app.kubernetes.io/part-of: code-code
    app.kubernetes.io/managed-by: platform-network-service
    egress.platform.code-code.internal/role: policy
data:
  policy.json: |
    {
      "policy_id": "default",
      "display_name": "Egress",
      "proxies": [
        {
          "proxy_id": "preset-proxy",
          "display_name": "Preset HTTP Proxy",
          "protocol": "EGRESS_PROXY_PROTOCOL_HTTP",
          "url": "http://127.0.0.1:10809"
        }
      ],
      "custom_rules": [
        {
          "rule_id": "external-rule-set-source-host",
          "display_name": "External Rule Set Source Host",
          "match": {
            "host_exact": "raw.githubusercontent.com"
          },
          "action": "EGRESS_ACTION_PROXY",
          "proxy_id": "preset-proxy"
        }
      ],
      "external_rule_set": {
        "source_url": "https://raw.githubusercontent.com/gfwlist/gfwlist/master/gfwlist.txt",
        "enabled": false,
        "action": "EGRESS_ACTION_PROXY",
        "proxy_id": "preset-proxy"
      }
    }
