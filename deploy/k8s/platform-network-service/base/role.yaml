apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: platform-network-service
rules:
  - apiGroups: [""]
    resources:
      - configmaps
      - services
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources:
      - deployments
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.istio.io"]
    resources:
      - gateways
      - serviceentries
      - virtualservices
      - destinationrules
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["cert-manager.io"]
    resources:
      - certificates
    verbs: ["get", "list", "create", "update", "patch", "delete"]
