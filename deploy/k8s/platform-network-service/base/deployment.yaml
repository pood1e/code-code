apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-network-service
spec:
  revisionHistoryLimit: 2
  progressDeadlineSeconds: 600
  replicas: 1
  strategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-network-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-network-service
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: platform-network-service
      containers:
        - name: platform-network-service
          image: code-code/platform-network-service:0.0.0
          imagePullPolicy: IfNotPresent
          env:
            - name: PLATFORM_NETWORK_SERVICE_GRPC_ADDR
              value: :8081
            - name: PLATFORM_NETWORK_SERVICE_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: PLATFORM_NETWORK_SERVICE_EGRESS_GATEWAY_NAMESPACE
              value: code-code-net
            - name: PLATFORM_NETWORK_SERVICE_EGRESS_GATEWAY_SERVICE_HOST
              value: code-code-egressgateway.code-code-net.svc.cluster.local
            - name: PLATFORM_NETWORK_SERVICE_EGRESS_GATEWAY_SELECTOR
              value: code-code-egressgateway
            - name: OTEL_SERVICE_NAME
              value: platform-network-service
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.code-code-observability.svc.cluster.local:4317
            - name: USER
              value: nonroot
          ports:
            - name: grpc
              containerPort: 8081
          lifecycle:
            preStop:
              sleep:
                seconds: 5
          startupProbe:
            grpc:
              port: 8081
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 72
          readinessProbe:
            grpc:
              port: 8081
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            grpc:
              port: 8081
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
