apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-support-service
spec:
  revisionHistoryLimit: 2
  progressDeadlineSeconds: 600
  replicas: 1
  strategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-support-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-support-service
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: platform-support-service
      containers:
        - name: platform-support-service
          image: code-code/platform-support-service:0.0.0
          imagePullPolicy: IfNotPresent
          env:
            - name: PLATFORM_SUPPORT_SERVICE_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: PLATFORM_SUPPORT_SERVICE_RUN_NAMESPACE
              value: code-code-runs
            - name: PLATFORM_SUPPORT_SERVICE_HTTP_ADDR
              value: :8080
            - name: PLATFORM_SUPPORT_SERVICE_GRPC_ADDR
              value: :8081
            - name: PLATFORM_SUPPORT_SERVICE_IMAGE_REGISTRY
              valueFrom:
                configMapKeyRef:
                  name: cli-runtime-image-build-config
                  key: IMAGE_REGISTRY_PREFIX
            - name: PLATFORM_SUPPORT_SERVICE_IMAGE_REGISTRY_LOOKUP_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: cli-runtime-image-build-config
                  key: IMAGE_REGISTRY_LOOKUP_PREFIX
            - name: PLATFORM_SUPPORT_SERVICE_IMAGE_REGISTRY_LOOKUP_INSECURE
              valueFrom:
                configMapKeyRef:
                  name: cli-runtime-image-build-config
                  key: IMAGE_REGISTRY_LOOKUP_INSECURE
            - name: PLATFORM_SUPPORT_SERVICE_REGISTRY_LIST_TIMEOUT
              value: "10s"
            - name: PLATFORM_SUPPORT_SERVICE_REGISTRY_LIST_CONCURRENCY
              value: "4"
            - name: PLATFORM_SUPPORT_SERVICE_IMAGE_BUILD_SOURCE_CONTEXT
              valueFrom:
                configMapKeyRef:
                  name: cli-runtime-image-build-config
                  key: SOURCE_CONTEXT
            - name: PLATFORM_SUPPORT_SERVICE_IMAGE_BUILD_SOURCE_REVISION
              valueFrom:
                configMapKeyRef:
                  name: cli-runtime-image-build-config
                  key: SOURCE_REVISION
            - name: PLATFORM_SUPPORT_SERVICE_DOMAIN_EVENTS_NATS_URL
              value: nats://nats.code-code-infra.svc.cluster.local:4222
            - name: TEMPORAL_ADDRESS
              value: temporal-frontend.code-code-infra.svc.cluster.local:7233
            - name: TEMPORAL_NAMESPACE
              value: default
            - name: DOCKER_CONFIG
              value: /registry-auth
            - name: PLATFORM_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-auth
                  key: DATABASE_URL
            - name: OTEL_SERVICE_NAME
              value: platform-support-service
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.code-code-observability.svc.cluster.local:4317
            - name: USER
              value: nonroot
            - name: SSL_CERT_FILE
              value: /var/run/code-code-egress-trust/ca-certificates.crt
            - name: REQUESTS_CA_BUNDLE
              value: /var/run/code-code-egress-trust/ca-certificates.crt
            - name: CURL_CA_BUNDLE
              value: /var/run/code-code-egress-trust/ca-certificates.crt
            - name: GIT_SSL_CAINFO
              value: /var/run/code-code-egress-trust/ca-certificates.crt
            - name: NODE_EXTRA_CA_CERTS
              value: /var/run/code-code-egress-trust/ca-certificates.crt
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 8081
          lifecycle:
            preStop:
              sleep:
                seconds: 5
          volumeMounts:
            - name: registry-auth
              mountPath: /registry-auth
              readOnly: true
            - name: egress-trust-bundle
              mountPath: /var/run/code-code-egress-trust
              readOnly: true
          startupProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 72
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: registry-auth
          secret:
            secretName: cli-runtime-image-build-registry-auth
            optional: true
        - name: egress-trust-bundle
          configMap:
            name: code-code-egress-trust-bundle
