apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: console
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls: []
  rules:
    - host: console.localhost
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: console-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: console-web
                port:
                  number: 8080
