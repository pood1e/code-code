apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-provider-service
spec:
  revisionHistoryLimit: 2
  progressDeadlineSeconds: 600
  replicas: 1
  strategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-provider-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-provider-service
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: platform-provider-service
      containers:
        - name: platform-provider-service
          image: code-code/platform-provider-service:0.0.0
          imagePullPolicy: IfNotPresent
          env:
            - name: PLATFORM_PROVIDER_SERVICE_GRPC_ADDR
              value: :8081
            - name: PLATFORM_PROVIDER_SERVICE_HTTP_ADDR
              value: :8080
            - name: PLATFORM_PROVIDER_SERVICE_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: PLATFORM_PROVIDER_SERVICE_AUTH_GRPC_ADDR
              value: platform-auth-service:8081
            - name: PLATFORM_PROVIDER_SERVICE_MODEL_GRPC_ADDR
              value: platform-model-service:8081
            - name: PLATFORM_PROVIDER_SERVICE_WORKFLOW_PROVIDER_HTTP_BASE_URL
              value: http://platform-provider-service.code-code.svc.cluster.local:8080/internal/actions
            - name: TEMPORAL_ADDRESS
              value: temporal-frontend.code-code-infra.svc.cluster.local:7233
            - name: TEMPORAL_NAMESPACE
              value: default
            - name: PLATFORM_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-auth
                  key: DATABASE_URL
            - name: OTEL_SERVICE_NAME
              value: platform-provider-service
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.code-code-observability.svc.cluster.local:4317
            - name: USER
              value: nonroot
            - name: SSL_CERT_FILE
              value: /var/run/code-code-egress-trust/ca-certificates.crt
            - name: REQUESTS_CA_BUNDLE
              value: /var/run/code-code-egress-trust/ca-certificates.crt
            - name: CURL_CA_BUNDLE
              value: /var/run/code-code-egress-trust/ca-certificates.crt
            - name: GIT_SSL_CAINFO
              value: /var/run/code-code-egress-trust/ca-certificates.crt
            - name: NODE_EXTRA_CA_CERTS
              value: /var/run/code-code-egress-trust/ca-certificates.crt
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 8081
          lifecycle:
            preStop:
              sleep:
                seconds: 5
          startupProbe:
            grpc:
              port: 8081
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 72
          readinessProbe:
            grpc:
              port: 8081
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            grpc:
              port: 8081
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: egress-trust-bundle
              mountPath: /var/run/code-code-egress-trust
              readOnly: true
      volumes:
        - name: egress-trust-bundle
          configMap:
            name: code-code-egress-trust-bundle
