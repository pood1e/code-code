apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-chat-service
spec:
  revisionHistoryLimit: 2
  progressDeadlineSeconds: 600
  replicas: 1
  strategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-chat-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-chat-service
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: platform-chat-service
      automountServiceAccountToken: false
      containers:
        - name: platform-chat-service
          image: code-code/platform-chat-service:0.0.0
          imagePullPolicy: IfNotPresent
          env:
            - name: PLATFORM_CHAT_SERVICE_GRPC_ADDR
              value: :8081
            - name: PLATFORM_CHAT_SERVICE_PROVIDER_GRPC_ADDR
              value: platform-provider-service:8081
            - name: PLATFORM_CHAT_SERVICE_CLI_RUNTIME_GRPC_ADDR
              value: platform-cli-runtime-service:8081
            - name: PLATFORM_CHAT_SERVICE_AGENT_RUNTIME_GRPC_ADDR
              value: platform-agent-runtime-service:8081
            - name: PLATFORM_CHAT_SERVICE_SUPPORT_GRPC_ADDR
              value: platform-support-service:8081
            - name: PLATFORM_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-auth
                  key: DATABASE_URL
            - name: OTEL_SERVICE_NAME
              value: platform-chat-service
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.code-code-observability.svc.cluster.local:4317
            - name: USER
              value: nonroot
          ports:
            - name: grpc
              containerPort: 8081
          lifecycle:
            preStop:
              sleep:
                seconds: 5
          startupProbe:
            grpc:
              port: 8081
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 72
          readinessProbe:
            grpc:
              port: 8081
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            grpc:
              port: 8081
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
