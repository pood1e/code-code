apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: platform-agent-runtime-service-runtime
rules:
  - apiGroups: [""]
    resources:
      - persistentvolumeclaims
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources:
      - persistentvolumeclaims
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources:
      - jobs
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources:
      - pods
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources:
      - secrets
    verbs: ["get", "list", "create", "update", "patch", "delete"]
