apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: platform-agent-runtime-service
rules:
  - apiGroups: ["platform.code-code.internal"]
    resources:
      - agentrunresources
      - agentrunresources/status
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources:
      - leases
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources:
      - configmaps
    verbs: ["get", "list", "create", "update", "patch"]
