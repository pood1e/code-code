receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
processors:
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 20
  k8sattributes:
    auth_type: serviceAccount
    extract:
      metadata:
        - k8s.namespace.name
        - k8s.pod.name
        - k8s.node.name
        - k8s.deployment.name
  resource:
    attributes:
      - key: service.namespace
        from_attribute: k8s.namespace.name
        action: upsert
  batch: {}
exporters:
  otlphttp/prometheus:
    endpoint: http://prometheus.{{ .Values.global.observabilityNamespace }}.svc.cluster.local:9090/api/v1/otlp
  {{- if .Values.otelCollector.tempoEnabled }}
  otlp/tempo:
    endpoint: {{ default (printf "tempo.%s.svc.cluster.local:4317" .Values.global.observabilityNamespace) .Values.otelCollector.tempoEndpoint }}
    tls:
      insecure: true
  {{- else }}
  nop: {}
  {{- end }}
service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, k8sattributes, resource, batch]
      exporters: [otlphttp/prometheus]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, k8sattributes, resource, batch]
      {{- if .Values.otelCollector.tempoEnabled }}
      exporters: [otlp/tempo]
      {{- else }}
      exporters: [nop]
      {{- end }}
