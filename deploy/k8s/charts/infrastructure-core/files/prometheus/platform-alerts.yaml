groups:
  - name: platform-provider-observability
    rules:
      - alert: ProviderOAuthObservabilityFailureRateHigh
        expr: |
          (
            sum(increase(gen_ai_provider_cli_oauth_active_operation_runs_total{outcome=~"auth_blocked|failed"}[30m]))
            /
            sum(increase(gen_ai_provider_cli_oauth_active_operation_runs_total[30m]))
          ) > 0.2
          and
          sum(increase(gen_ai_provider_cli_oauth_active_operation_runs_total[30m])) >= 5
        for: 10m
        labels:
          severity: warning
          component: provider-observability
          team: platform
        annotations:
          summary: "Provider OAuth observability failures are elevated"
          description: "More than 20% of CLI OAuth active observability operations failed or were auth-blocked in the last 30 minutes."
          runbook_url: "docs/platform/provider-observability-workflow.md"
      - alert: VendorObservabilityFailureRateHigh
        expr: |
          (
            sum(increase(gen_ai_provider_vendor_api_key_active_operation_runs_total{outcome=~"auth_blocked|failed"}[30m]))
            /
            sum(increase(gen_ai_provider_vendor_api_key_active_operation_runs_total[30m]))
          ) > 0.2
          and
          sum(increase(gen_ai_provider_vendor_api_key_active_operation_runs_total[30m])) >= 5
        for: 10m
        labels:
          severity: warning
          component: provider-observability
          team: platform
        annotations:
          summary: "Vendor observability failures are elevated"
          description: "More than 20% of vendor API-key active observability operations failed or were auth-blocked in the last 30 minutes."
          runbook_url: "docs/platform/provider-observability-workflow.md"
