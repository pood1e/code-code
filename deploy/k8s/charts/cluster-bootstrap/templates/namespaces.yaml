{{- if .Values.namespaces.enabled }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.global.platformNamespace }}
  labels:
{{ include "cluster-bootstrap.labels" (dict "root" . "name" .Values.global.platformNamespace "componentLabel" "namespace") | nindent 4 }}
    code-code.internal/purpose: control-plane
    egress.platform.code-code.internal/trust-bundle: "enabled"
    istio.io/dataplane-mode: ambient
    istio.io/use-waypoint: waypoint
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.global.infraNamespace }}
  labels:
{{ include "cluster-bootstrap.labels" (dict "root" . "name" .Values.global.infraNamespace "componentLabel" "namespace") | nindent 4 }}
    code-code.internal/purpose: infrastructure
    egress.platform.code-code.internal/trust-bundle: "enabled"
    istio.io/dataplane-mode: ambient
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.global.networkNamespace }}
  labels:
{{ include "cluster-bootstrap.labels" (dict "root" . "name" .Values.global.networkNamespace "componentLabel" "namespace") | nindent 4 }}
    code-code.internal/purpose: node-networking
    egress.platform.code-code.internal/trust-bundle: "enabled"
    istio.io/dataplane-mode: ambient
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.global.observabilityNamespace }}
  labels:
{{ include "cluster-bootstrap.labels" (dict "root" . "name" .Values.global.observabilityNamespace "componentLabel" "namespace") | nindent 4 }}
    code-code.internal/purpose: observability
    egress.platform.code-code.internal/trust-bundle: "enabled"
    istio.io/dataplane-mode: ambient
    istio.io/use-waypoint: waypoint
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.global.runNamespace }}
  labels:
{{ include "cluster-bootstrap.labels" (dict "root" . "name" .Values.global.runNamespace "componentLabel" "namespace") | nindent 4 }}
    code-code.internal/purpose: agent-runtime
    egress.platform.code-code.internal/trust-bundle: "enabled"
    istio.io/dataplane-mode: ambient
    istio.io/use-waypoint: waypoint
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
{{- end }}
