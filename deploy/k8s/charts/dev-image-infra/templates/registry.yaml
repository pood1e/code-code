{{- if .Values.registry.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.registry.name }}
  namespace: {{ .Values.global.infraNamespace }}
  labels:
{{ include "devImageInfra.labels" (dict "root" . "name" .Values.registry.name "componentLabel" "registry") | nindent 4 }}
spec:
  replicas: {{ .Values.registry.replicaCount }}
  selector:
    matchLabels:
{{ include "devImageInfra.selectorLabels" (dict "root" . "name" .Values.registry.name) | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "devImageInfra.labels" (dict "root" . "name" .Values.registry.name "componentLabel" "registry") | nindent 8 }}
    spec:
      containers:
        - name: registry
          image: {{ .Values.registry.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ .Values.registry.port }}
              protocol: TCP
          env:
            - name: REGISTRY_HTTP_ADDR
              value: ":{{ .Values.registry.port }}"
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: {{ ternary "true" "false" .Values.registry.deleteEnabled | quote }}
          resources:
{{ toYaml .Values.registry.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: storage
              mountPath: /var/lib/registry
      volumes:
        - name: storage
{{- if .Values.registry.storage.persistentVolumeClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.registry.storage.persistentVolumeClaim }}
{{- else }}
          emptyDir: {}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.registry.name }}
  namespace: {{ .Values.global.infraNamespace }}
  labels:
{{ include "devImageInfra.labels" (dict "root" . "name" .Values.registry.name "componentLabel" "registry") | nindent 4 }}
spec:
  type: {{ .Values.registry.service.type }}
  selector:
{{ include "devImageInfra.selectorLabels" (dict "root" . "name" .Values.registry.name) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.registry.port }}
      protocol: TCP
      targetPort: http
{{- if and (eq .Values.registry.service.type "NodePort") (gt (int .Values.registry.service.nodePort) 0) }}
      nodePort: {{ .Values.registry.service.nodePort }}
{{- end }}
{{- end }}
