{{- if .Values.cache.enabled }}
{{- $root := . }}
{{- range $key := keys .Values.cache.mirrors | sortAlpha }}
{{- $mirror := index $root.Values.cache.mirrors $key }}
{{- if $mirror.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $mirror.name }}
  namespace: {{ $root.Values.global.infraNamespace }}
  labels:
{{ include "devImageInfra.labels" (dict "root" $root "name" $mirror.name "componentLabel" "cache") | nindent 4 }}
spec:
  replicas: {{ $root.Values.cache.replicaCount }}
  selector:
    matchLabels:
{{ include "devImageInfra.selectorLabels" (dict "root" $root "name" $mirror.name) | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "devImageInfra.labels" (dict "root" $root "name" $mirror.name "componentLabel" "cache") | nindent 8 }}
    spec:
      containers:
        - name: registry-cache
          image: {{ $root.Values.cache.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ $root.Values.cache.port }}
              protocol: TCP
          env:
            - name: REGISTRY_HTTP_ADDR
              value: ":{{ $root.Values.cache.port }}"
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: {{ ternary "true" "false" $root.Values.cache.deleteEnabled | quote }}
            - name: REGISTRY_PROXY_REMOTEURL
              value: {{ $mirror.remoteUrl | quote }}
          resources:
{{ toYaml $root.Values.cache.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: storage
              mountPath: /var/lib/registry
      volumes:
        - name: storage
{{- if $mirror.persistentVolumeClaim }}
          persistentVolumeClaim:
            claimName: {{ $mirror.persistentVolumeClaim }}
{{- else }}
          emptyDir: {}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $mirror.name }}
  namespace: {{ $root.Values.global.infraNamespace }}
  labels:
{{ include "devImageInfra.labels" (dict "root" $root "name" $mirror.name "componentLabel" "cache") | nindent 4 }}
spec:
  type: {{ $root.Values.cache.service.type }}
  selector:
{{ include "devImageInfra.selectorLabels" (dict "root" $root "name" $mirror.name) | nindent 4 }}
  ports:
    - name: http
      port: {{ $root.Values.cache.port }}
      protocol: TCP
      targetPort: http
{{- if and (eq $root.Values.cache.service.type "NodePort") (gt (int $mirror.nodePort) 0) }}
      nodePort: {{ $mirror.nodePort }}
{{- end }}
---
{{- end }}
{{- end }}
{{- end }}
