server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  trace_idle_period: 10s
  max_block_duration: 5m
  complete_block_timeout: 10m

metrics_generator:
  traces_storage:
    path: /var/tempo/generator/traces
  processor:
    service_graphs: {}
    span_metrics: {}
    local_blocks: {}
  registry:
    external_labels:
      source: tempo
      cluster: {{ .Values.global.partOf | quote }}
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus.{{ .Values.global.observabilityNamespace }}.svc.cluster.local:9090/api/v1/write
        send_exemplars: true

compactor:
  compaction:
    block_retention: 24h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

overrides:
  defaults:
    ingestion:
      max_traces_per_user: 20000
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics
        - local-blocks
