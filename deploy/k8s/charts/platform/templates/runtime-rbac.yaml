{{- range $key := keys .Values.components | sortAlpha }}
{{- $component := index $.Values.components $key }}
{{- $runtimeRbac := $component.runtimeRbac | default dict }}
{{- if and $component.enabled $runtimeRbac.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $runtimeRbac.name }}
  namespace: {{ $.Values.global.runNamespace }}
  labels:
{{ include "platform.labels" (dict "root" $ "name" $component.name "componentLabel" $component.componentLabel) | nindent 4 }}
rules:
{{ toYaml $runtimeRbac.rules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $runtimeRbac.name }}
  namespace: {{ $.Values.global.runNamespace }}
  labels:
{{ include "platform.labels" (dict "root" $ "name" $component.name "componentLabel" $component.componentLabel) | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ $component.name }}
    namespace: {{ $.Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $runtimeRbac.name }}
---
{{- range $policyKey := keys ($runtimeRbac.networkPolicies | default dict) | sortAlpha }}
{{- $policy := index $runtimeRbac.networkPolicies $policyKey }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $policy.name }}
  namespace: {{ $.Values.global.runNamespace }}
  labels:
{{ include "platform.labels" (dict "root" $ "name" $component.name "componentLabel" $component.componentLabel) | nindent 4 }}
spec:
{{ toYaml $policy.spec | nindent 2 }}
---
{{- end }}
{{- end }}
{{- end }}
