{{- range $key := keys .Values.components | sortAlpha }}
{{- $component := index $.Values.components $key }}
{{- if and $component.enabled $component.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $component.name }}
  labels:
{{ include "platform.labels" (dict "root" $ "name" $component.name "componentLabel" $component.componentLabel) | nindent 4 }}
spec:
  selector:
{{ include "platform.selectorLabels" (dict "root" $ "name" $component.name) | nindent 4 }}
  ports:
{{ include "platform.renderServicePorts" (dict "service" $component.service) | nindent 4 }}
---
{{- end }}
{{- end }}
