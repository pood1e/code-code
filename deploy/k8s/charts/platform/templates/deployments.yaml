{{- range $key := keys .Values.components | sortAlpha }}
{{- $component := index $.Values.components $key }}
{{- if $component.enabled }}
{{- $deploymentDefaults := $.Values.defaults.deployment }}
{{- $resources := default $.Values.defaults.resources $component.resources }}
{{- $containerSecurityContext := default $.Values.defaults.containerSecurityContext $component.containerSecurityContext }}
{{- $lifecycle := default $.Values.defaults.lifecycle $component.lifecycle }}
{{- $serviceAccountName := include "platform.serviceAccountName" (dict "component" $component) | trim }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $component.name }}
  labels:
{{ include "platform.labels" (dict "root" $ "name" $component.name "componentLabel" $component.componentLabel) | nindent 4 }}
spec:
  revisionHistoryLimit: {{ default $deploymentDefaults.revisionHistoryLimit $component.revisionHistoryLimit }}
  progressDeadlineSeconds: {{ default $deploymentDefaults.progressDeadlineSeconds $component.progressDeadlineSeconds }}
  replicas: {{ default $deploymentDefaults.replicas $component.replicas }}
  strategy:
{{ toYaml (default $deploymentDefaults.strategy $component.strategy) | nindent 4 }}
  selector:
    matchLabels:
{{ include "platform.selectorLabels" (dict "root" $ "name" $component.name) | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "platform.labels" (dict "root" $ "name" $component.name "componentLabel" $component.componentLabel) | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: {{ default $deploymentDefaults.terminationGracePeriodSeconds $component.terminationGracePeriodSeconds }}
      {{- if $serviceAccountName }}
      serviceAccountName: {{ $serviceAccountName }}
      {{- end }}
      {{- if hasKey $component "podAutomountServiceAccountToken" }}
      automountServiceAccountToken: {{ $component.podAutomountServiceAccountToken }}
      {{- end }}
      {{- if $component.podSecurityContext }}
      securityContext:
{{ toYaml $component.podSecurityContext | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $component.name }}
          image: {{ include "platform.image" (dict "root" $ "imageName" $component.imageName) }}
          imagePullPolicy: {{ default "IfNotPresent" $component.imagePullPolicy }}
          {{- if $component.env }}
          env:
{{ include "platform.renderEnv" (dict "root" $ "env" $component.env) | nindent 12 }}
          {{- if hasKey $component.env "OTEL_EXPORTER_OTLP_ENDPOINT" }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ default "grpc" $.Values.global.otlpProtocol | quote }}
            - name: OTEL_EXPORTER_OTLP_TRACES_PROTOCOL
              value: {{ default "grpc" $.Values.global.otlpProtocol | quote }}
            - name: OTEL_EXPORTER_OTLP_METRICS_PROTOCOL
              value: {{ default "grpc" $.Values.global.otlpProtocol | quote }}
            - name: OTEL_TRACES_ENABLED
              value: {{ ternary "true" "false" (default false $.Values.global.tracesEnabled) | quote }}
          {{- end }}
          {{- end }}
          {{- if $component.containerPorts }}
          ports:
{{ include "platform.renderContainerPorts" (dict "ports" $component.containerPorts) | nindent 12 }}
          {{- end }}
          {{- if $lifecycle }}
          lifecycle:
{{ toYaml $lifecycle | nindent 12 }}
          {{- end }}
          {{- if $component.startupProbe }}
          startupProbe:
{{ toYaml $component.startupProbe | nindent 12 }}
          {{- end }}
          {{- if $component.readinessProbe }}
          readinessProbe:
{{ toYaml $component.readinessProbe | nindent 12 }}
          {{- end }}
          {{- if $component.livenessProbe }}
          livenessProbe:
{{ toYaml $component.livenessProbe | nindent 12 }}
          {{- end }}
          securityContext:
{{ toYaml $containerSecurityContext | nindent 12 }}
          resources:
{{ toYaml $resources | nindent 12 }}
          {{- if $component.volumeMounts }}
          volumeMounts:
{{ include "platform.renderVolumeMounts" (dict "mounts" $component.volumeMounts) | nindent 12 }}
          {{- end }}
      {{- if $component.volumes }}
      volumes:
{{ include "platform.renderVolumes" (dict "volumes" $component.volumes) | nindent 8 }}
      {{- end }}
---
{{- end }}
{{- end }}
