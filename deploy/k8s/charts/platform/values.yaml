      PLATFORM_AGENT_RUNTIME_SERVICE_PROVIDER_GRPC_ADDR:
        value: platform-provider-service:8081
      PLATFORM_AGENT_RUNTIME_SERVICE_RUNTIME_NAMESPACE:
        valueTpl: '{{ .Values.global.runNamespace }}'
      PLATFORM_AGENT_RUNTIME_SERVICE_SUPPORT_GRPC_ADDR:
        value: platform-support-service:8081
      PLATFORM_DATABASE_URL:
        valueFrom:
          secretKeyRef:
            key: DATABASE_URL
            name: postgres-auth
      REQUESTS_CA_BUNDLE:
        value: /var/run/code-code-egress-trust/ca-certificates.crt
      SSL_CERT_FILE:
        value: /var/run/code-code-egress-trust/ca-certificates.crt
      TEMPORAL_ADDRESS:
        valueTpl: '{{ .Values.global.temporalAddress }}'
      TEMPORAL_NAMESPACE:
        valueTpl: '{{ .Values.global.temporalNamespace }}'
      USER:
        value: nonroot
    volumes:
      egressTrustBundle:
        name: egress-trust-bundle
        configMap:
          name: code-code-egress-trust-bundle
    volumeMounts:
      egressTrustBundle:
        name: egress-trust-bundle
        mountPath: /var/run/code-code-egress-trust
        readOnly: true
    startupProbe:
      grpc:
        port: 8081
      periodSeconds: 5
      timeoutSeconds: 5
      failureThreshold: 72
    readinessProbe:
      grpc:
        port: 8081
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1
    livenessProbe:
      grpc:
        port: 8081
      periodSeconds: 20
      timeoutSeconds: 5
      failureThreshold: 3
    rbac:
      enabled: true
      clusterWide: true
      name: platform-agent-runtime-service
      rules:
        - apiGroups:
            - platform.code-code.internal
          resources:
            - agentrunresources
            - agentrunresources/status
          verbs:
            - get
            - list
            - watch
            - create
            - update
            - patch
            - delete
        - apiGroups:
            - coordination.k8s.io
          resources:
            - leases
          verbs:
            - get
            - list
            - watch
            - create
            - update
            - patch
            - delete
        - apiGroups:
            - ""
          resources:
            - configmaps
          verbs:
            - get
            - list
            - create
            - update
            - patch
        - apiGroups:
            - ""
          resources:
            - events
          verbs:
            - create
            - patch
            - update
    runtimeRbac:
      enabled: true
      name: platform-agent-runtime-service-runtime
      rules:
        - apiGroups:
            - ""
          resources:
            - persistentvolumeclaims
          verbs:
            - get
            - list
        - apiGroups:
            - ""
          resources:
            - persistentvolumeclaims
          verbs:
            - create
            - update
            - patch
            - delete
        - apiGroups:
            - batch
          resources:
            - jobs
          verbs:
            - get
            - list
            - watch
            - create
            - delete
        - apiGroups:
            - ""
          resources:
            - pods
          verbs:
            - get
            - list
        - apiGroups:
            - ""
          resources:
            - secrets
          verbs:
            - get
            - list
            - create
            - update
            - patch
            - delete
      networkPolicies:
        agentRunDefaultDeny:
          name: agent-run-default-deny
          spec:
            podSelector:
              matchLabels:
                code-code.internal/runtime: agent-run
            policyTypes:
              - Ingress
              - Egress
        agentRunEgress:
          name: agent-run-egress
          spec:
            podSelector:
              matchLabels:
                code-code.internal/runtime: agent-run
            policyTypes:
              - Egress
            egress:
              - ports:
                  - protocol: UDP
                    port: 53
                  - protocol: TCP
                    port: 53
              - to:
                  - ipBlock:
                      # Placeholder; override via deploy/release.sh values or chart values.
                      cidr: 192.0.2.1/32
                ports:
                  - protocol: TCP
                    port: 443
              - to:
                  - ipBlock:
                      # Placeholder; override via deploy/release.sh values or chart values.
                      cidr: 192.0.2.2/32
                ports:
                  - protocol: TCP
                    port: 6443
              - to:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: code-code-net
                ports:
                  - protocol: TCP
                    port: 443
              - to:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: code-code
                    podSelector:
                      matchLabels:
                        app.kubernetes.io/name: platform-agent-runtime-service
                ports:
                  - protocol: TCP
                    port: 8080
                  - protocol: TCP
                    port: 8081
              - to:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: code-code-infra
                    podSelector:
                      matchLabels:
                        app.kubernetes.io/name: nats
                ports:
                  - protocol: TCP
                    port: 4222
              - to:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: code-code-infra
                    podSelector:
                      matchLabels:
                        app.kubernetes.io/name: otel-collector
                ports:
                  - protocol: TCP
                    port: 4318

