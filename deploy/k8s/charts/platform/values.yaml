# global is the shared deployment configuration for platform services.
global:
  # global.partOf is the shared app.kubernetes.io/part-of label value.
  partOf: code-code
  # global.imageRegistry is the optional registry prefix used for platform images.
  imageRegistry: ""
  # global.imageTag is the shared image tag for platform images.
  imageTag: "0.0.0"
  # global.runNamespace is the namespace used by runtime jobs and per-run RBAC.
  runNamespace: code-code-runs
  # global.infraNamespace is the namespace used by infrastructure services.
  infraNamespace: code-code-infra
  # global.observabilityNamespace is the namespace used by observability services.
  observabilityNamespace: code-code-observability
  # global.egressGatewayNamespace is the namespace used by the egress gateway.
  egressGatewayNamespace: code-code-net
  # global.egressGatewayServiceHost is the fully qualified Service DNS name for the egress gateway.
  egressGatewayServiceHost: code-code-egressgateway.code-code-net.svc.cluster.local
  # global.egressGatewaySelector is the selector label value used by the network service.
  egressGatewaySelector: code-code-egressgateway
  # global.natsUrl is the NATS address used by Temporal-enabled services.
  natsUrl: nats://nats.code-code-infra.svc.cluster.local:4222
  # global.otlpGrpcEndpoint is the shared OTLP endpoint for backend services.
  otlpGrpcEndpoint: http://otel-collector.code-code-observability.svc.cluster.local:4317
  # global.otlpProtocol is the OTLP transport protocol used by backend services.
  otlpProtocol: grpc
  # global.tracesEnabled controls whether backend services export traces.
  tracesEnabled: false
  # global.otlpHttpEndpoint is the shared OTLP HTTP endpoint.
  otlpHttpEndpoint: http://otel-collector.code-code-observability.svc.cluster.local:4318
  # global.temporalAddress is the Temporal frontend address.
  temporalAddress: temporal-frontend.code-code-infra.svc.cluster.local:7233
  # global.temporalNamespace is the Temporal namespace used by platform workflows.
  temporalNamespace: temporal-system
  # global.databaseSecretName is the Secret name containing DATABASE_URL.
  databaseSecretName: postgres-auth
  # global.databaseSecretKey is the Secret key containing DATABASE_URL.
  databaseSecretKey: DATABASE_URL
  # global.registryAuthSecretName is the optional registry auth Secret used by build services.
  registryAuthSecretName: cli-runtime-image-build-registry-auth
  # global.trustBundleConfigMapName is the ConfigMap name for the egress trust bundle.
  trustBundleConfigMapName: code-code-egress-trust-bundle
  # global.consoleBaseUrl is the OAuth callback base URL for auth flows.
  consoleBaseUrl: http://console.localhost
  # global.cliOutputSidecarImageName is the image name used by agent-runtime for the CLI sidecar.
  cliOutputSidecarImageName: cli-output-sidecar

# defaults is the shared deployment baseline for platform workloads.
defaults:
  # defaults.deployment describes the default Deployment spec knobs.
  deployment:
    replicas: 1
    revisionHistoryLimit: 2
    progressDeadlineSeconds: 600
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 0
        maxUnavailable: 1
    terminationGracePeriodSeconds: 30
  # defaults.lifecycle is the shared container lifecycle block.
  lifecycle:
    preStop:
      sleep:
        seconds: 5
  # defaults.containerSecurityContext is the shared restricted container context.
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  # defaults.resources is the shared resource request and limit set.
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

# cliImageBuildConfig is the shared ConfigMap consumed by support and cli-runtime services.
cliImageBuildConfig:
  # cliImageBuildConfig.enabled toggles the cli-runtime-image-build-config ConfigMap.
  enabled: true
  # cliImageBuildConfig.imageRegistryPrefix is the published registry prefix for built runtime images.
  imageRegistryPrefix: ""
  # cliImageBuildConfig.imageRegistryLookupPrefix is the lookup registry prefix used by the services.
  imageRegistryLookupPrefix: ""
  # cliImageBuildConfig.imageRegistryLookupInsecure controls whether registry lookup skips TLS verification.
  imageRegistryLookupInsecure: "false"
  # cliImageBuildConfig.sourceContext is the source repository context recorded in image build metadata.
  sourceContext: ""
  # cliImageBuildConfig.sourceRevision is the source revision recorded in image build metadata.
  sourceRevision: main

# consoleIngress controls the operator-facing console ingress.
consoleIngress:
  # consoleIngress.enabled toggles the shared console ingress.
  enabled: true
  # consoleIngress.host is the hostname published by the console ingress.
  host: console.placeholder.invalid
  # consoleIngress.extraHosts is the additional hostname list published by the same console ingress.
  extraHosts: []
  # consoleIngress.tlsEnabled controls whether the ingress renders a TLS block.
  tlsEnabled: true
  # consoleIngress.tlsSecretName is the Secret name used by ingress TLS.
  tlsSecretName: console-tls-placeholder
  # consoleIngress.sslRedirect controls the nginx ssl-redirect annotation.
  sslRedirect: true

# runtimeServiceAccounts controls auxiliary ServiceAccounts created outside the main components map.
runtimeServiceAccounts:
  # runtimeServiceAccounts.cliImageBuild is consumed by CLI runtime build jobs in the run namespace.
  cliImageBuild:
    enabled: true
    name: cli-runtime-image-build

# networkEgressPolicy controls the ConfigMap consumed by platform-network-service.
networkEgressPolicy:
  # networkEgressPolicy.enabled toggles the shared egress policy ConfigMap.
  enabled: true
  # networkEgressPolicy.name is the ConfigMap name read by platform-network-service.
  name: code-code-egress-policy
  # networkEgressPolicy.presetProxyUrl is the default preset HTTP proxy endpoint used by policyJson.
  presetProxyUrl: http://127.0.0.1:10809
  # networkEgressPolicy.policyJson is the serialized default egress policy document.
  policyJson: |-
    {
      "policy_id": "default",
      "display_name": "Egress",
      "proxies": [
        {
          "proxy_id": "preset-proxy",
          "display_name": "Preset HTTP Proxy",
          "protocol": "EGRESS_PROXY_PROTOCOL_HTTP",
          "url": "{{ .Values.networkEgressPolicy.presetProxyUrl }}"
        }
      ],
      "custom_rules": [
        {
          "rule_id": "external-rule-set-source-host",
          "display_name": "External Rule Set Source Host",
          "match": {
            "host_exact": "raw.githubusercontent.com"
          },
          "action": "EGRESS_ACTION_PROXY",
          "proxy_id": "preset-proxy"
        },
        {
          "rule_id": "model-catalog-github-models",
          "display_name": "Model Catalog GitHub Models",
          "match": {
            "host_exact": "models.github.ai"
          },
          "action": "EGRESS_ACTION_PROXY",
          "proxy_id": "preset-proxy"
        },
        {
          "rule_id": "model-catalog-cerebras",
          "display_name": "Model Catalog Cerebras",
          "match": {
            "host_exact": "api.cerebras.ai"
          },
          "action": "EGRESS_ACTION_PROXY",
          "proxy_id": "preset-proxy"
        },
        {
          "rule_id": "model-catalog-nvidia-integrate",
          "display_name": "Model Catalog NVIDIA Integrate",
          "match": {
            "host_exact": "integrate.api.nvidia.com"
          },
          "action": "EGRESS_ACTION_PROXY",
          "proxy_id": "preset-proxy"
        },
        {
          "rule_id": "model-catalog-huggingface",
          "display_name": "Model Catalog HuggingFace",
          "match": {
            "host_exact": "huggingface.co"
          },
          "action": "EGRESS_ACTION_PROXY",
          "proxy_id": "preset-proxy"
        },
        {
          "rule_id": "model-catalog-modelscope",
          "display_name": "Model Catalog ModelScope",
          "match": {
            "host_exact": "api-inference.modelscope.cn"
          },
          "action": "EGRESS_ACTION_PROXY",
          "proxy_id": "preset-proxy"
        },
        {
          "rule_id": "model-catalog-openrouter",
          "display_name": "Model Catalog OpenRouter",
          "match": {
            "host_exact": "openrouter.ai"
          },
          "action": "EGRESS_ACTION_PROXY",
          "proxy_id": "preset-proxy"
        }
      ],
      "external_rule_set": {
        "source_url": "https://raw.githubusercontent.com/gfwlist/gfwlist/master/gfwlist.txt",
        "enabled": false,
        "action": "EGRESS_ACTION_PROXY",
        "proxy_id": "preset-proxy"
      }
    }

# components is the component map keyed by logical service name.
components:
  # components.auth controls the auth gRPC/HTTP service.
  auth:
    enabled: true
    name: platform-auth-service
    componentLabel: auth
    imageName: platform-auth-service
    serviceAccount:
      create: true
      automountServiceAccountToken: true
    service:
      enabled: true
      ports:
        grpc: 8081
        http: 8080
    containerPorts:
      grpc: 8081
      http: 8080
    env:
      CURL_CA_BUNDLE:
        value: /var/run/code-code-egress-trust/ca-certificates.crt
      GIT_SSL_CAINFO:
        value: /var/run/code-code-egress-trust/ca-certificates.crt
      NODE_EXTRA_CA_CERTS:
        value: /var/run/code-code-egress-trust/ca-certificates.crt
      OTEL_EXPORTER_OTLP_ENDPOINT:
        valueTpl: '{{ .Values.global.otlpGrpcEndpoint }}'
      OTEL_SERVICE_NAME:
        value: platform-auth-service
      PLATFORM_AUTH_SERVICE_AGENT_RUNTIME_GRPC_ADDR:
        value: platform-agent-runtime-service:8081
      PLATFORM_AUTH_SERVICE_DOMAIN_EVENTS_NATS_URL:
        valueTpl: '{{ .Values.global.natsUrl }}'
      PLATFORM_AUTH_SERVICE_GRPC_ADDR:
        value: :8081
      PLATFORM_AUTH_SERVICE_HTTP_ADDR:
        value: :8080
      PLATFORM_AUTH_SERVICE_NAMESPACE:
        valueFrom:
          fieldRef:
            apiVersion: v1
            fieldPath: metadata.namespace
      PLATFORM_AUTH_SERVICE_OAUTH_CALLBACK_BASE_URL:
        valueTpl: '{{ .Values.global.consoleBaseUrl }}'
      PLATFORM_DATABASE_URL:
        valueFrom:
          secretKeyRef:
            key: DATABASE_URL
            name: postgres-auth
      REQUESTS_CA_BUNDLE:
        value: /var/run/code-code-egress-trust/ca-certificates.crt
      SSL_CERT_FILE:
        value: /var/run/code-code-egress-trust/ca-certificates.crt
      TEMPORAL_ADDRESS:
        valueTpl: '{{ .Values.global.temporalAddress }}'
      TEMPORAL_NAMESPACE:
        valueTpl: '{{ .Values.global.temporalNamespace }}'
      USER:
        value: nonroot
    volumes:
      egressTrustBundle:
        name: egress-trust-bundle
        configMap:
          name: code-code-egress-trust-bundle
    volumeMounts:
      egressTrustBundle:
        name: egress-trust-bundle
        mountPath: /var/run/code-code-egress-trust
        readOnly: true
    startupProbe:
      grpc:
        port: 8081
      periodSeconds: 5
      timeoutSeconds: 5
      failureThreshold: 72
    readinessProbe:
      grpc:
        port: 8081
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1
    livenessProbe:
      grpc:
        port: 8081
      periodSeconds: 20
      timeoutSeconds: 5
      failureThreshold: 3
    rbac:
      enabled: true
      clusterWide: false
      name: platform-auth-service
      rules:
        - apiGroups:
            - ""
          resources:
            - secrets
          verbs:
            - get
            - list
            - create
            - update
            - patch
            - delete

