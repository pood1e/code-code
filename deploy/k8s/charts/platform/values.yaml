    componentLabel: web
    imageName: console-web
    podAutomountServiceAccountToken: false
    service:
      enabled: true
      ports:
        http: 8080
    containerPorts:
      http: 8080
    env:
      OTEL_COLLECTOR_ENDPOINT:
        valueTpl: '{{ .Values.global.otlpHttpEndpoint }}'
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 101
      runAsGroup: 101
      seccompProfile:
        type: RuntimeDefault
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
    volumes:
