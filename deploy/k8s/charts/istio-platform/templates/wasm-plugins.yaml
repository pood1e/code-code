{{- if .Values.components.wasmPlugins.enabled }}
apiVersion: extensions.istio.io/v1alpha1
kind: WasmPlugin
metadata:
  name: code-code-runs-egress-auth-header
  namespace: {{ .Values.global.egressNamespace }}
  labels:
{{ include "istio-platform.labels" (dict "root" . "name" "code-code-runs-egress-auth-header" "componentLabel" "wasm-plugin") | nindent 4 }}
spec:
  selector:
    matchLabels:
      istio: {{ .Values.global.egressGatewaySelector }}
  type: HTTP
  phase: AUTHN
  priority: 10
  pluginName: code-code-agent-runtime-egress-auth-header
  url: {{ include "istio-platform.wasmImage" (dict "root" . "imageName" .Values.global.wasmRuntimeImageName) }}
  imagePullPolicy: IfNotPresent
  failStrategy: FAIL_CLOSE
  pluginConfig:
    auth_service_cluster: outbound|8081||platform-auth-service.{{ .Values.global.platformNamespace }}.svc.cluster.local
    auth_service_name: platform.auth.v1.AuthService
    auth_service_request_method: ResolveEgressRequestHeaders
    auth_service_response_method: ResolveEgressResponseHeaders
    agent_session_cluster: outbound|8081||platform-agent-runtime-service.{{ .Values.global.platformNamespace }}.svc.cluster.local
    agent_session_name: platform.management.v1.AgentSessionManagementService
    response_headers_record_method: RecordAgentRunResponseHeaders
    require_runtime_source: true
    runtime_namespace: {{ .Values.global.runNamespace }}
    timeout_milliseconds: 3000
---
apiVersion: extensions.istio.io/v1alpha1
kind: WasmPlugin
metadata:
  name: code-code-egress-auth-header
  namespace: {{ .Values.global.egressNamespace }}
  labels:
{{ include "istio-platform.labels" (dict "root" . "name" "code-code-egress-auth-header" "componentLabel" "wasm-plugin") | nindent 4 }}
spec:
  selector:
    matchLabels:
      istio: {{ .Values.global.egressGatewaySelector }}
  type: HTTP
  phase: AUTHN
  priority: 5
  pluginName: code-code-control-plane-egress-auth-header
  url: {{ include "istio-platform.wasmImage" (dict "root" . "imageName" .Values.global.wasmControlPlaneImageName) }}
  imagePullPolicy: IfNotPresent
  failStrategy: FAIL_CLOSE
  pluginConfig:
    auth_service_cluster: outbound|8081||platform-auth-service.{{ .Values.global.platformNamespace }}.svc.cluster.local
    auth_service_name: platform.auth.v1.AuthService
    auth_service_request_method: ResolveEgressRequestHeaders
    auth_service_response_method: ResolveEgressResponseHeaders
    timeout_milliseconds: 3000
{{- end }}
