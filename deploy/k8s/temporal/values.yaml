server:
  replicaCount: 1
  securityContext:
    fsGroup: 1000
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault
  config:
    logLevel: "info"
    persistence:
      defaultStore: default
      visibilityStore: visibility
      numHistoryShards: 4
      datastores:
        default:
          sql:
            createDatabase: true
            manageSchema: true
            pluginName: postgres12_pgx
            driverName: postgres12_pgx
            databaseName: temporal
            connectAddr: postgres.code-code-infra.svc.cluster.local:5432
            connectProtocol: tcp
            user: code_code
            existingSecret: postgres-auth
            secretKey: POSTGRES_PASSWORD
            maxConns: 10
            maxIdleConns: 10
        visibility:
          sql:
            createDatabase: true
            manageSchema: true
            pluginName: postgres12_pgx
            driverName: postgres12_pgx
            databaseName: temporal_visibility
            connectAddr: postgres.code-code-infra.svc.cluster.local:5432
            connectProtocol: tcp
            user: code_code
            existingSecret: postgres-auth
            secretKey: POSTGRES_PASSWORD
            maxConns: 5
            maxIdleConns: 5
  resources:
    requests:
      cpu: 25m
      memory: 96Mi
    limits:
      cpu: 500m
      memory: 512Mi
  frontend:
    resources:
      requests:
        cpu: 25m
        memory: 96Mi
      limits:
        cpu: 500m
        memory: 512Mi
    containerSecurityContext: &temporalRestrictedContainerSecurityContext
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
  history:
    resources:
      requests:
        cpu: 25m
        memory: 128Mi
      limits:
        cpu: 750m
        memory: 768Mi
    containerSecurityContext: *temporalRestrictedContainerSecurityContext
  matching:
    resources:
      requests:
        cpu: 25m
        memory: 96Mi
      limits:
        cpu: 500m
        memory: 512Mi
    containerSecurityContext: *temporalRestrictedContainerSecurityContext
  worker:
    resources:
      requests:
        cpu: 25m
        memory: 96Mi
      limits:
        cpu: 500m
        memory: 512Mi
    containerSecurityContext: *temporalRestrictedContainerSecurityContext

admintools:
  enabled: false

web:
  enabled: false

schema:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 512Mi
  containerSecurityContext: *temporalRestrictedContainerSecurityContext
  securityContext:
    fsGroup: 1000
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault

test:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

shims:
  dockerize: false
  elasticsearchTool: false
