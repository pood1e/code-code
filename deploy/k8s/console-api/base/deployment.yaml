apiVersion: apps/v1
kind: Deployment
metadata:
  name: console-api
spec:
  revisionHistoryLimit: 2
  progressDeadlineSeconds: 600
  replicas: 1
  strategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: console-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: console-api
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: console-api
      automountServiceAccountToken: false
      containers:
        - name: console-api
          image: code-code/console-api:0.0.0
          imagePullPolicy: IfNotPresent
          env:
            - name: CONSOLE_API_ADDR
              value: :8080
            - name: CONSOLE_API_MODEL_CONNECT_BASE_URL
              value: http://platform-model-service:8080
            - name: CONSOLE_API_PROVIDER_CONNECT_BASE_URL
              value: http://platform-provider-service:8080
            - name: CONSOLE_API_PROVIDER_GRPC_ADDR
              value: platform-provider-service:8081
            - name: CONSOLE_API_PROFILE_GRPC_ADDR
              value: platform-profile-service:8081
            - name: CONSOLE_API_EGRESS_GRPC_ADDR
              value: platform-network-service:8081
            - name: CONSOLE_API_AUTH_GRPC_ADDR
              value: platform-auth-service:8081
            - name: CONSOLE_API_CHAT_GRPC_ADDR
              value: platform-chat-service:8081
            - name: CONSOLE_API_SUPPORT_GRPC_ADDR
              value: platform-support-service:8081
            - name: OTEL_SERVICE_NAME
              value: console-api
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.code-code-observability.svc.cluster.local:4317
            - name: USER
              value: nonroot
          ports:
            - name: http
              containerPort: 8080
          lifecycle:
            preStop:
              sleep:
                seconds: 5
          startupProbe:
            httpGet:
              path: /api/readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 72
          readinessProbe:
            httpGet:
              path: /api/readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
