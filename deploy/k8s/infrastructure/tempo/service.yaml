apiVersion: v1
kind: Service
metadata:
  name: tempo
  labels:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/component: tracing
spec:
  selector:
    app.kubernetes.io/name: tempo
  ports:
    - name: http
      port: 3200
      targetPort: http
    - name: grpc-otlp
      appProtocol: grpc
      port: 4317
      targetPort: otlp-grpc
    - name: http-otlp
      appProtocol: http
      port: 4318
      targetPort: otlp-http
