apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/component: observability
spec:
  selector:
    app.kubernetes.io/name: otel-collector
  ports:
    - name: grpc-otlp
      appProtocol: grpc
      port: 4317
      targetPort: otlp-grpc
    - name: http-otlp
      appProtocol: http
      port: 4318
      targetPort: otlp-http
