apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-dispatcher
  labels:
    app.kubernetes.io/name: notification-dispatcher
    app.kubernetes.io/component: notification-dispatch
spec:
  replicas: 1
  revisionHistoryLimit: 2
  progressDeadlineSeconds: 300
  selector:
    matchLabels:
      app.kubernetes.io/name: notification-dispatcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notification-dispatcher
        app.kubernetes.io/component: notification-dispatch
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dispatcher
          image: code-code/notification-dispatcher:0.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          lifecycle:
            preStop:
              sleep:
                seconds: 5
          env:
            - name: NOTIFICATION_DISPATCHER_HTTP_ADDR
              value: :8080
            - name: NOTIFICATION_DISPATCHER_NATS_URL
              value: nats://nats.code-code-infra.svc.cluster.local:4222
            - name: NOTIFICATION_DISPATCHER_SUBJECT
              value: platform.notifications.requested
            - name: NOTIFICATION_DISPATCHER_APPRISE_URL
              value: http://apprise-api.code-code.svc.cluster.local:8000/notify/
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            timeoutSeconds: 5
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
              ephemeral-storage: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 128Mi
