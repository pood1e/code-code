apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-notifications
  labels:
    app.kubernetes.io/name: notification-dispatcher
    app.kubernetes.io/component: inbound-message-adapter
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 1m
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - notifications-primary.placeholder.invalid
        - notifications-secondary.placeholder.invalid
      secretName: platform-notifications-tls-placeholder
  rules:
    - host: notifications-primary.placeholder.invalid
      http:
        paths:
          - path: /wecom/callback
            pathType: Exact
            backend:
              service:
                name: wecom-callback-adapter
                port:
                  number: 8080
          - path: /wecom/robots/default/callback
            pathType: Exact
            backend:
              service:
                name: wecom-robot-default-callback-adapter
                port:
                  number: 8080
    - host: notifications-secondary.placeholder.invalid
      http:
        paths:
          - path: /wecom/callback
            pathType: Exact
            backend:
              service:
                name: wecom-callback-adapter
                port:
                  number: 8080
          - path: /wecom/robots/default/callback
            pathType: Exact
            backend:
              service:
                name: wecom-robot-default-callback-adapter
                port:
                  number: 8080
