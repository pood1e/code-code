apiVersion: v1
kind: Service
metadata:
  name: apprise-api
  labels:
    app.kubernetes.io/name: apprise-api
    app.kubernetes.io/component: notification-sender
spec:
  selector:
    app.kubernetes.io/name: apprise-api
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apprise-api
  labels:
    app.kubernetes.io/name: apprise-api
    app.kubernetes.io/component: notification-sender
spec:
  replicas: 1
  revisionHistoryLimit: 2
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app.kubernetes.io/name: apprise-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apprise-api
        app.kubernetes.io/component: notification-sender
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: apprise-api
          image: caronc/apprise:1.3.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          lifecycle:
            preStop:
              sleep:
                seconds: 5
          env:
            - name: APPRISE_STATEFUL_MODE
              value: simple
            - name: APPRISE_WORKER_COUNT
              value: "1"
            - name: APPRISE_ADMIN
              value: "n"
            - name: APPRISE_API_ONLY
              value: "yes"
            - name: APPRISE_STATELESS_URLS
              valueFrom:
                secretKeyRef:
                  name: notification-apprise-urls
                  key: urls
          volumeMounts:
            - name: config
              mountPath: /config
            - name: plugin
              mountPath: /plugin
            - name: attach
              mountPath: /attach
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /status/
              port: http
            timeoutSeconds: 5
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /status/
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 36
          livenessProbe:
            httpGet:
              path: /status/
              port: http
            timeoutSeconds: 5
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
              ephemeral-storage: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
              ephemeral-storage: 512Mi
      volumes:
        - name: config
          emptyDir: {}
        - name: plugin
          emptyDir: {}
        - name: attach
          emptyDir: {}
        - name: tmp
          emptyDir:
            medium: Memory
