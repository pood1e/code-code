apiVersion: v1
kind: Service
metadata:
  name: wecom-callback-adapter
  labels:
    app.kubernetes.io/name: wecom-callback-adapter
    app.kubernetes.io/component: inbound-message-adapter
spec:
  selector:
    app.kubernetes.io/name: wecom-callback-adapter
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wecom-callback-adapter
  labels:
    app.kubernetes.io/name: wecom-callback-adapter
    app.kubernetes.io/component: inbound-message-adapter
spec:
  replicas: 1
  revisionHistoryLimit: 2
  progressDeadlineSeconds: 300
  selector:
    matchLabels:
      app.kubernetes.io/name: wecom-callback-adapter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wecom-callback-adapter
        app.kubernetes.io/component: inbound-message-adapter
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: adapter
          image: code-code/wecom-callback-adapter:0.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          lifecycle:
            preStop:
              sleep:
                seconds: 5
          env:
            - name: WECOM_CALLBACK_HTTP_ADDR
              value: :8080
            - name: WECOM_CALLBACK_PATH
              value: /wecom/callback
            - name: WECOM_CALLBACK_NATS_URL
              value: nats://nats.code-code-infra.svc.cluster.local:4222
            - name: WECOM_CALLBACK_NATS_SUBJECT
              value: platform.wecom.messages.received
            - name: WECOM_CALLBACK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: wecom-callback
                  key: token
            - name: WECOM_CALLBACK_ENCODING_AES_KEY
              valueFrom:
                secretKeyRef:
                  name: wecom-callback
                  key: encoding-aes-key
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            timeoutSeconds: 5
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            timeoutSeconds: 5
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
              ephemeral-storage: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 128Mi
