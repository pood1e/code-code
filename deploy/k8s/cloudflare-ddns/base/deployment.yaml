apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflare-ddns
  labels:
    app.kubernetes.io/name: cloudflare-ddns
    app.kubernetes.io/component: dns-updater
spec:
  revisionHistoryLimit: 2
  progressDeadlineSeconds: 600
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflare-ddns
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflare-ddns
        app.kubernetes.io/component: dns-updater
    spec:
      terminationGracePeriodSeconds: 5
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cloudflare-ddns
          image: favonia/cloudflare-ddns:1.16.2
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: cloudflare-ddns-config
            - secretRef:
                name: cloudflare-ddns-token
          env:
            - name: RECORD_COMMENT
              value: managed-by-code-code-cloudflare-ddns
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
              ephemeral-storage: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 128Mi
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
