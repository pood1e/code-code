apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: code-code-egress-selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: code-code-egress-root-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: code-code egress TLS termination root CA
  secretName: code-code-egress-root-ca
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: code-code-egress-selfsigned
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: code-code-egress-ca
spec:
  ca:
    secretName: code-code-egress-root-ca
